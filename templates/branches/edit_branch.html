{% extends 'base.html' %}
{% block title %}Edit Branch{% endblock %}
{% block content %}

<div class="min-h-full   bg-gray-100 py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white shadow-xl rounded-2xl p-8">
        <h4 class="text-2xl font-bold text-gray-800 mb-8 text-center">Edit Branch</h4>

        <form method="POST" class="space-y-6">
            <!-- Branch Name -->
            <div>
                <label for="branch_name" class="block text-sm font-medium text-gray-700">Branch Name</label>
                <input type="text" id="branch_name" name="branch" value="{{ branch['Branch'] }}" required
                    class="mt-1 w-full rounded-xl border border-gray-300 shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 px-4 py-2 transition-all">
            </div>

            <!-- Branch Manager -->
            <div>
                <label for="branch_manager" class="block text-sm font-medium text-gray-700">Branch Manager</label>
                <input type="text" id="branch_manager" name="branch_manager" value="{{ branch['BranchManagerName'] }}"
                    required
                    class="mt-1 w-full rounded-xl border border-gray-300 shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 px-4 py-2 transition-all">
            </div>

            <!-- Address -->
            <div>
                <label for="address" class="block text-sm font-medium text-gray-700">Address</label>
                <input type="text" id="address" name="address" value="{{ branch['Address'] }}" required
                    class="mt-1 w-full rounded-xl border border-gray-300 shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 px-4 py-2 transition-all">
            </div>

            <!-- Contact Number -->
            <div>
                <label for="contact_number" class="block text-sm font-medium text-gray-700">Contact Number</label>
                <input type="text" id="contact_number" name="contact_number" value="{{ branch['ContactNumber'] }}"
                    required
                    class="mt-1 w-full rounded-xl border border-gray-300 shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 px-4 py-2 transition-all">
            </div>

            <!-- Status -->
            <div>
                <label for="status" class="block text-sm font-medium text-gray-700">Status</label>
                <select id="status" name="status" required
                    class="mt-1 w-full rounded-xl border border-gray-300 shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 px-4 py-2 transition-all">
                    <option value="Active" {% if branch['Status']=='Active' %}selected{% endif %}>Active</option>
                    <option value="Inactive" {% if branch['Status']=='Inactive' %}selected{% endif %}>Inactive</option>
                </select>
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea id="description" name="description" rows="4" required
                    class="mt-1 w-full rounded-xl border border-gray-300 shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 px-4 py-2 transition-all">{{ branch['Description'] }}</textarea>
            </div>

            <!-- Buttons -->
            <div class="flex justify-start items-center pt-4 space-x-4">
                <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded-xl transition-transform transform hover:scale-105 shadow">
                    <i class="fas fa-save mr-2"></i> Update Branch
                </button>
                <button type="button"
                    class="bg-gray-800 hover:bg-red-900 text-white font-semibold py-2 px-4 rounded-xl transition-all duration-300"
                    onclick="window.location.href='{{ url_for('branches.list_branches') }}'">
                    <i class="fas fa-times mr-2"></i> Cancel
                </button>

            </div>
        </form>
    </div>
</div>

{% endblock %}
