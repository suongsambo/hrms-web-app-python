{% extends 'base.html' %} {% block title %}Add Branch{% endblock %} {% block
content %}

<body class="bg-gray-100">
  <div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-4">Add New Branch</h2>

    {% if error_message %}
    <div class="mb-4 p-4 bg-red-100 text-red-700 rounded-md">
      {{ error_message }}
    </div>
    {% endif %}

    <form action="{{ url_for('add_branch') }}" method="POST" class="space-y-4">
      <div>
        <label class="block text-gray-700">Branch</label>
        <input type="text" name="branch" class="w-full border border-gray-300 rounded-md p-2" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700">Branch Manager Name</label>
          <input type="text" name="branch_manager" class="w-full border border-gray-300 rounded-md p-2" />
        </div>
        <div>
          <label class="block text-gray-700">Contact Number</label>
          <input type="tel" name="contact_number" pattern="\+855\s\d{8}" placeholder="+855 10655037" value="+855 "
            class="w-full border border-gray-300 rounded-md p-2" />
        </div>
      </div>

      <div>
        <label class="block text-gray-700">Address</label>
        <input type="text" name="address" class="w-full border border-gray-300 rounded-md p-2" />
      </div>

      <div>
        <label class="block text-gray-700">Register Date</label>
        <input type="date" name="register_date" class="w-full border border-gray-300 rounded-md p-2" />
      </div>

      <div>
        <label class="block text-gray-700">Local Description</label>
        <textarea name="local_description" class="w-full border border-gray-300 rounded-md p-2"></textarea>
      </div>

      <div>
        <label class="block text-gray-700">Local Address</label>
        <input type="text" name="local_address" class="w-full border border-gray-300 rounded-md p-2" />
      </div>

      <div>
        <label class="block text-gray-700">Local Branch Manager Name</label>
        <input type="text" name="local_branch_manager" class="w-full border border-gray-300 rounded-md p-2" />
      </div>

      <div>
        <label class="block text-gray-700">Description</label>
        <textarea name="description" class="w-full border border-gray-300 rounded-md p-2"></textarea>
      </div>

      <div class="mt-4">
        <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded-md">
          Submit
        </button>
        <a href="{{ url_for('list_branches') }}" class="ml-2 text-gray-500">
          <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">
            Cancel
          </button>
        </a>
      </div>
    </form>
  </div>
</body>

{% endblock %}
