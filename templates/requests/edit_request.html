<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Request</title>
</head>
<body>
    <h1>Edit Request</h1>

    <!-- Form to edit an existing request -->
    <form method="POST">
        <label for="fund_request_amount">Fund Request Amount:</label>
        <input type="text" name="fund_request_amount" value="{{ request.fund_request_amount }}" required><br>

        <label for="fund_request_date">Fund Request Date:</label>
        <input type="date" name="fund_request_date" value="{{ request.fund_request_date }}" required><br>

        <label for="term">Term:</label>
        <input type="text" name="term" value="{{ request.term }}" required><br>

        <label for="payment_mode">Payment Mode:</label>
        <input type="text" name="payment_mode" value="{{ request.payment_mode }}" required><br>

        <label for="conform_status">Conform Status:</label>
        <select name="conform_status">
            <option value="Pending" {% if request.conform_status == 'Pending' %}selected{% endif %}>Pending</option>
            <option value="Approved" {% if request.conform_status == 'Approved' %}selected{% endif %}>Approved</option>
            <option value="Rejected" {% if request.conform_status == 'Rejected' %}selected{% endif %}>Rejected</option>
        </select><br>

        <!-- Add all other fields similarly as in add_request.html -->

        <button type="submit">Update Request</button>
    </form>

    <a href="{{ url_for('list_requests') }}">Back to List</a>
</body>
</html>
