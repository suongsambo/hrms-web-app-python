{% extends 'base.html' %}

{% block title %}Employees{% endblock %}

{% block content %}
  <body class="bg-gray-100">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-4">Add Leave Request</h1>

      <form
        action="{{ url_for('add_leave') }}"
        method="POST"
        class="bg-white shadow-md rounded-lg p-6"
      >

{% if current_user.is_admin == 1 %}
        <div class="mb-4">
          <label
            for="employee_id"
            class="block text-gray-700 text-sm font-medium"
            >Select Employee</label
          >
          <select
            name="employee_id"
            id="employee_id"
            required
            class="mt-2 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          >
            <option value="" disabled selected hidden>Select an Employee</option>
            {% for employee in employees %}
            <option value="{{ employee.id }}">{{ employee.name }}</option>
            {% endfor %}
          </select>
        </div>

        {% endif %} 


        {% if current_user.is_admin == 1 %}
        <!-- Admin View: Select Employee -->
        <div class="mb-4">
          <label for="employee_id" class="block text-gray-700 text-sm font-medium">Select Employee</label>
          <select
            name="employee_id"
            id="employee_id"
            required
            class="mt-2 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          >
            <option value="" disabled selected hidden>Select an Employee</option>
            {% for employee in employees %}
              <option value="{{ employee.id }}">{{ employee.name }}</option>
            {% endfor %}
          </select>
        </div>
    {% else %}
        <!-- Non-admin View: Auto Select User's Employee ID -->
        <input type="hidden" name="employee_id" value="{{ current_user.id }}">
    {% endif %}
     

        <div class="mb-4">
          <label
            for="leave_type"
            class="block text-gray-700 text-sm font-medium"
          >
            Select Leave Type:
          </label>
          <select
            id="leave_type"
            name="leave_type"
           class="mt-2 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          >
            <option value="annualLeave">Annual Leave</option>
            <option value="sickLeave">Sick Leave</option>
            <option value="maternityLeave">Maternity Leave</option>
            <option value="specialLeave"> Special Leave</option>
          </select>
        </div>

        <div class="mb-4">
          <label
            for="start_date"
            class="block text-gray-700 text-sm font-medium"
            >Start Date</label
          >
          <input
            type="date"
            name="start_date"
            id="start_date"
            required
            class="mt-2 px-4 py-2 border border-gray-300 rounded-md w-full"
          />
        </div>

        <div class="mb-4">
          <label for="end_date" class="block text-gray-700 text-sm font-medium"
            >End Date</label
          >
          <input
            type="date"
            name="end_date"
            id="end_date"
            required
            class="mt-2 px-4 py-2 border border-gray-300 rounded-md w-full"
          />
        </div>

        <div class="mb-4">
          <label for="reason" class="block text-gray-700 text-sm font-medium"
            >Reason</label
          >
          <textarea
            name="reason"
            id="reason"
            rows="4"
            required
            class="mt-2 px-4 py-2 border border-gray-300 rounded-md w-full"
          ></textarea>
        </div>

        <div class="flex justify-start">
          <button
            type="submit"
            class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 flex items-center"
            class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600"
          >
            <i class="fas fa-paper-plane mr-2"></i> Submit
            Submit
          </button>
          <a
            href="{{ url_for('view_leaves') }}"
            class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 ml-2 flex items-center"
            class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 ml-2"
          >
            <i class="fas fa-arrow-left mr-2"></i> Back
            Back
          </a>
        </div>
      </form>
    </div>
  </body>
</html>


{% endblock %}
