<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Multiple Leaves</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-lg">
      <h2 class="text-2xl font-bold mb-4 text-center">Add Multiple Leaves</h2>
      <form
        method="POST"
        action="{{ url_for('add_many_leave') }}"
        class="space-y-4"
      >
        <div>
          <label for="employee_id">Employee</label>
          <input
            type="text"
            id="employee_id"
            name="employee_id"
            value="{{ current_user.employee_id }}"
            hidden
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          />
        </div>

        <div>
          <label for="requested_by">Requested By</label>
          <input
            type="text"
            id="requested_by"
            name="requested_by"
            hidden
            value="{{ current_user.username }}"
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          />
        </div>

        <div class="mb-4">
          <label
            for="leave_type"
            class="block text-gray-700 text-sm font-medium"
          >
            Select Leave Type:
          </label>
          <select
            id="leave_type"
            name="leave_type"
            class="mt-2 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          >
            <option value="annualLeave">Annual Leave</option>
            <option value="sickLeave">Sick Leave</option>
            <option value="maternityLeave">Maternity Leave</option>
            <option value="specialLeave">Special Leave</option>
          </select>
        </div>

        <div>
          <label for="start_date" class="block font-medium">Start Date:</label>
          <input
            type="date"
            name="start_date"
            required
            class="w-full p-2 border rounded-lg"
          />
        </div>

        <div>
          <label for="end_date" class="block font-medium">End Date:</label>
          <input
            type="date"
            name="end_date"
            required
            class="w-full p-2 border rounded-lg"
          />
        </div>

        <div>
          <label for="reason" class="block font-medium">Reason:</label>
          <textarea
            name="reason"
            required
            class="w-full p-2 border rounded-lg"
          ></textarea>
        </div>

        <div>
          <label for="user_ids" class="block font-medium"
            >Assign to Users:</label
          >
          <select
            name="user_ids"
            multiple
            required
            class="w-full p-2 border rounded-lg"
          >
            {% for user in users %}
            <option value="{{ user.id }}">{{ user.username }}</option>
            {% endfor %}
          </select>
        </div>

        <button
          type="submit"
          class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600"
        >
          Submit
        </button>
      </form>
    </div>
  </body>
</html>
