{% extends 'base.html' %}
{% block title %}Edit Leave{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-8 bg-white p-6 rounded-lg shadow">
    <h2 class="text-2xl font-semibold mb-4 text-indigo-700">Edit Leave</h2>
    <form method="post">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Leave Type</label>
            <input type="text" name="leave_type" value="{{ leave['leave_type'] }}" class="w-full border rounded p-2"
                required>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Start Date</label>
            <input type="date" name="start_date" value="{{ leave['start_date'] }}" class="w-full border rounded p-2"
                required>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">End Date</label>
            <input type="date" name="end_date" value="{{ leave['end_date'] }}" class="w-full border rounded p-2"
                required>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Reason</label>
            <textarea name="reason" class="w-full border rounded p-2" required>{{ leave['reason'] }}</textarea>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Status</label>
            <select name="status" class="w-full border rounded p-2">
                <option value="Pending" {% if leave['status']=='Pending' %}selected{% endif %}>Pending</option>
                <option value="Approved" {% if leave['status']=='Approved' %}selected{% endif %}>Approved</option>
                <option value="Rejected" {% if leave['status']=='Rejected' %}selected{% endif %}>Rejected</option>
            </select>
        </div>
        <div class="flex justify-between">
            <a href="{{ url_for('view_leaves') }}" class="text-blue-600 hover:underline">Back</a>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Update</button>
        </div>
    </form>
</div>
{% endblock %}
