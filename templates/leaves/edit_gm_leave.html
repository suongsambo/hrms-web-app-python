{% extends 'base.html' %}

{% block title %}Edit Leave GM{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-100 py-10">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Add border-green-500 below -->
        <div class="bg-white shadow-xl rounded-2xl p-8 border-2 border-green-500">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">Edit Leave Request</h1>

            <form method="POST" action="{{ url_for('edit_leave_gm_approve', id=leave['id']) }}" class="space-y-6">
                <!-- Leave Type -->
                <div>
                    <label for="leave_type" class="block text-sm font-medium text-gray-700">Leave Type</label>
                    <input type="text" id="leave_type" name="leave_type" value="{{ leave['leave_type'] }}"
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3"
                        required>
                </div>

                <!-- Start Date -->
                <div>
                    <label for="start_date" class="block text-sm font-medium text-gray-700">Start Date</label>
                    <input type="date" id="start_date" name="start_date" value="{{ leave['start_date'][:10] }}"
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3"
                        required>
                </div>

                <!-- End Date -->
                <div>
                    <label for="end_date" class="block text-sm font-medium text-gray-700">End Date</label>
                    <input type="date" id="end_date" name="end_date" value="{{ leave['end_date'][:10] }}"
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3"
                        required>
                </div>

                <!-- Reason -->
                <div>
                    <label for="reason" class="block text-sm font-medium text-gray-700">Reason</label>
                    <textarea id="reason" name="reason" rows="4"
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3"
                        required>{{ leave['reason'] }}</textarea>
                </div>

                <!-- Approved By and Verified By -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="approved_by" class="block text-sm font-medium text-gray-700">Approved By (if
                            applicable)</label>
                        <input type="text" name="approved_by"
                            value="{% if leave['service_count'] >= 6 %}{{ current_user.username }}{% else %}{{ leave['verified_by'] or '' }}{% endif %}"
                            class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3">
                    </div>
                </div>

                <!-- Status -->
                <div>
                    <label for="status" class="block text-sm font-medium text-gray-700">Status</label>
                    <select id="status" name="status"
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3">
                        <option value="Approved" {% if leave['status']=='Approved' or leave['status'] is none
                            %}selected{% endif %}>Approved</option>
                        <option value="Verified" {% if leave['status']=='Verified' %}selected{% endif %}>Verified
                        </option>
                    </select>
                </div>

                <!-- Submit Button -->
                <div class="flex justify-start space-x-4">
                    <button type="submit"
                        class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        <i class="fas fa-save mr-2"></i> Update
                    </button>

                    <a href="{{ url_for('leaves_by_gm') }}"
                        class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                        <i class="fas fa-arrow-left mr-2"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
