{% extends 'base.html' %}

{% block title %}Edit Leave GM{% endblock %}

{% block content %}
<div class="min-h-full bg-gray-100 py-28">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Add border-green-500 below -->
        <div class="bg-white shadow-xl rounded-2xl p-8 border-2 border-green-500">

            <div class="bg-blue-100 text-blue-800 px-4 py-2 rounded-t-md shadow-sm mb-2">
                <h2 class="text-lg font-semibold uppercase tracking-wide">
                    Edit Leave
                </h2>
            </div>
            <form method="POST" action="{{ url_for('edit_leave_gm_approve', id=leave['id']) }}" class="space-y-6">
                <!-- Leave Type -->

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">


                    <div>
                        <label for="leave_type" class="block text-sm font-medium text-gray-700">Leave Type</label>
                        <input type="text" id="leave_type" name="leave_type" value="{{ leave['leave_type'] }}"
                            class="mt-1 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                            required>
                    </div>

                    <!-- Approved By (readonly) -->
                    <div>
                        <label for="approved_by" class="block text-sm font-medium text-gray-700">Approved By</label>
                        <input type="text" id="approved_by" name="approved_by" value="{{ current_user.username }}"
                            class="mt-1 block w-full p-2 text-sm border border-gray-300 rounded-md bg-gray-100"
                            readonly>
                    </div>

                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Start Date -->
                    <div>
                        <label for="start_date" class="block text-sm font-medium text-gray-700">Start Date</label>
                        <input type="date" id="start_date" name="start_date" value="{{ leave['start_date'][:10] }}"
                            class="mt-1 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                            required>
                    </div>

                    <!-- End Date -->
                    <div>
                        <label for="end_date" class="block text-sm font-medium text-gray-700">End Date</label>
                        <input type="date" id="end_date" name="end_date" value="{{ leave['end_date'][:10] }}"
                            class="mt-1 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                            required>
                    </div>
                </div>

                <!-- Reason -->
                <div>
                    <label for="reason" class="block text-sm font-medium text-gray-700">Reason</label>
                    <textarea id="reason" name="reason" rows="4"
                        class="mt-1 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                        required>{{ leave['reason'] }}</textarea>
                </div>



                <!-- Status -->
                <div>
                    <label for="status" class="block text-sm font-medium text-gray-700">Status</label>
                    <select id="status" name="status"
                        class="mt-1 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        <option value="Approved" {% if leave['status']=='Approved' or leave['status'] is none
                            %}selected{% endif %}>Approved</option>
                        <!-- <option value="Verified" {% if leave['status']=='Verified' %}selected{% endif %}>Verified
                        </option> -->
                        <option value="Rejected" {% if leave['status']=='Rejected' %}selected{% endif %}>Rejected
                        </option>
                    </select>
                </div>

                <!-- Submit Button -->
                <div class="flex justify-start space-x-4">
                    <button type="submit"
                        class="inline-flex justify-center items-center px-4 py-2 text-base font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        <i class="fas fa-save mr-2"></i> Update
                    </button>

                    <a href="{{ url_for('leaves_by_gm') }}"
                        class="inline-flex justify-center items-center px-4 py-2 text-base font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                        <i class="fas fa-arrow-left mr-2"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
