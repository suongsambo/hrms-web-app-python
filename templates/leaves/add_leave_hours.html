{% extends 'base.html' %} {% block title %}Add Leave{% endblock %} {% block
content %}
<body class="bg-gray-100 py-8">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-lg">
    <h2 class="text-2xl font-semibold text-gray-700 mb-6">Add Leave Hours</h2>

    <form
      method="POST"
      action="{{ url_for('add_leave_hours') }}"
      class="space-y-6"
    >
      <!-- Employee selection -->
      <div>
        <label for="employee_id" class="block text-sm font-medium text-gray-700"
          >Employee</label
        >
        <select
          id="employee_id"
          name="employee_id"
          required
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
        >
          <option value="">Select an Employee</option>
          {% for employee in employees %}
          <option value="{{ employee.id }}">{{ employee.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Requested By -->
      <div>
        <label
          for="requested_by"
          class="block text-sm font-medium text-gray-700"
          >Requested By</label
        >
        <input
          type="text"
          id="requested_by"
          name="requested_by"
          hidden
          value="{{ current_user.username }}"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
        />
      </div>

      <!-- Leave Type selection -->
      <div>
        <label for="leave_type" class="block text-sm font-medium text-gray-700"
          >Leave Type</label
        >
        <select
          id="leave_type"
          name="leave_type"
          required
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
        >
          <option value="">Select Leave Type</option>
          <option value="Sick">Sick</option>
          <option value="Vacation">Vacation</option>
          <option value="Maternity">Maternity</option>
          <option value="Paternity">Paternity</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- Start Date with Icon -->
      <div class="relative">
        <label for="start_date" class="block text-sm font-medium text-gray-700"
          >Start Date</label
        >
        <div class="relative">
          <input
            type="text"
            id="start_date"
            name="start_date"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm pl-10 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          />
          <!-- Calendar Icon -->
          <span
            class="absolute inset-y-0 left-2 flex items-center text-gray-500 pointer-events-none"
          >
            <i class="fas fa-calendar-alt"></i>
          </span>
        </div>
      </div>

      <!-- End Date with Icon -->
      <div class="relative">
        <label for="end_date" class="block text-sm font-medium text-gray-700"
          >End Date</label
        >
        <div class="relative">
          <input
            type="text"
            id="end_date"
            name="end_date"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm pl-10 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          />
          <!-- Calendar Icon -->
          <span
            class="absolute inset-y-0 left-2 flex items-center text-gray-500 pointer-events-none"
          >
            <i class="fas fa-calendar-alt"></i>
          </span>
        </div>
      </div>

      <!-- Reason -->
      <div>
        <label for="reason" class="block text-sm font-medium text-gray-700"
          >Reason for Leave</label
        >
        <textarea
          id="reason"
          name="reason"
          rows="4"
          required
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
        ></textarea>
      </div>

      <!-- Submit Button -->
      <div class="flex justify-end">
        <button
          type="submit"
          class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-md shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-50"
        >
          Submit
        </button>
      </div>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      flatpickr("#start_date", {
        enableTime: true,
        dateFormat: "Y-m-d H:i",
        minDate: "today",
      });
      flatpickr("#end_date", {
        enableTime: true,
        dateFormat: "Y-m-d H:i",
        minDate: "today",
      });
    });
  </script>
</body>
{% endblock %}
