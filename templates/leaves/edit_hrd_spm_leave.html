{% extends 'base.html' %}

{% block title %}Edit Leave SPM1 {% endblock %}

{% block content %}

<body class="bg-gray-100 min-h-screen">

    <div class="max-w-3xl mx-auto py-10 px-4 sm:px-6 lg:px-8">


        <form method="POST" action="{{ url_for('edit_leave_hrd_spm_approve', id=leave['id']) }}"
            class="bg-white shadow-xl rounded-2xl p-8 space-y-6">

            <div class="bg-blue-100 text-blue-800 px-4 py-2 rounded-t-md shadow-sm mb-2">
                <h2 class="text-lg font-semibold uppercase tracking-wide">
                    Edit Leave
                </h2>
            </div>
            <div class="mb-2 p-2 bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 rounded-md shadow">
                <p class="text-sm font-medium">
                    ⚠️ This form is read-only except for Status field.
                </p>
            </div>
            <!-- Leave Type -->
            <div>
                <label for="leave_type" class="block text-sm font-medium text-gray-700">Leave Type</label>
                <input type="text" id="leave_type" name="leave_type" value="{{ leave['leave_type'] }}" readonly
                    class="mt-1  bg-gray-200 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                    required>
            </div>

            <!-- Start Date -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="start_date" class="block text-sm font-medium text-gray-700">Start Date</label>
                    <input type="date" id="start_date" name="start_date" value="{{ leave['start_date'][:10] }}" readonly
                        class="mt-1 bg-gray-200 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                        required>
                </div>

                <!-- End Date -->
                <div>
                    <label for="end_date" class="block text-sm font-medium text-gray-700">End Date</label>
                    <input type="date" id="end_date" name="end_date" value="{{ leave['end_date'][:10] }}" readonly
                        class="mt-1 bg-gray-200 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <!-- Approved By / Verified By -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Approved By (if applicable)</label>
                    <input type="text" name="approved_by" value="" readonly
                        class="mt-1 bg-gray-200 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Verified By</label>
                    <input type="text" name="verified_by" value="{{ current_user.username }}" readonly
                        class="mt-1 bg-gray-200 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>


            <!-- Reason -->
            <div>
                <label for="reason" class="block text-sm font-medium text-gray-700">Reason</label>
                <textarea id="reason" name="reason" rows="4" readonly
                    class="mt-1  bg-gray-200 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                    required>{{ leave['reason'] }}</textarea>
            </div>

            <!-- Status Dropdown -->
            <div>
                <label for="status" class="block text-sm font-medium text-gray-700">Status</label>
                <select id="status" name="status"
                    class="mt-1 block w-full p-2 text-sm border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="Approved" {% if leave['status']=='Approved' or leave['status'] is none %}selected{%
                        endif %}>Approved</option>
                    <option value="Verified" {% if leave['status']=='Verified' %}selected{% endif %}>Verified</option>
                </select>
            </div>


            <div class="flex justify-start gap-4 items-center pt-2">
                <button type="submit"
                    class="w-full md:w-auto px-3 py-1.5 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <i class="fas fa-save mr-1"></i> Update
                </button>
                <a href="{{ url_for('leaves_by_branch_and_hrd') }}"
                    class="mt-2 md:mt-0 text-gray-700 text-sm font-medium px-3 py-1.5 border border-gray-300 rounded-md hover:text-blue-600 hover:border-blue-600 transition">
                    <i class="fas fa-arrow-left mr-1"></i> Cancel
                </a>
            </div>

        </form>
    </div>

</body>
{% endblock %}
