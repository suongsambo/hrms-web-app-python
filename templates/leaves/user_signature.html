<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Signature</title>
</head>

<body>
    <h1>User Signature for Leave</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>UserName</th>
                <th>Email</th>
                <th>Signature</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ user['ID'] }}</td>
                <td>{{ user['UserName'] }}</td>
                <td>{{ user['Email'] }}</td>
                <td>
                    {% if user['Signature'] %}
                    <img src="data:image/png;base64,{{ user['Signature'] }}" alt="Signature" />
                    {% else %}
                    No signature available
                    {% endif %}
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
