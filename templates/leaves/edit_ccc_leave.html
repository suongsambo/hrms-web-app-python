{% extends 'base.html' %}

{% block title %}Edit Leave{% endblock %}

{% block content %}
<div class="bg-gray-100 min-h-full grid items-center justify-center px-10 pt-16 pb-16">
  <div class="max-w-3xl w-full bg-white p-7 border border-gray-200 rounded-xl shadow-md">
    <h4 class="text-2xl font-semibold text-gray-900 mb-8 tracking-tight">CCC Verify</h4>

    <form action="{{ url_for('edit_leave_ccc_verify', id=leave['id']) }}" method="POST" class="space-y-6">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
        <!-- Verified By -->
        <div>
          <label for="verified_by" class="block text-sm font-medium text-gray-700 mb-1">Verified By</label>
          <input type="text" id="verified_by" name="verified_by" value="{{ current_user.username }}"
            class="w-full rounded-xl border border-gray-300 px-4 py-2 shadow-sm focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 focus:outline-none"
            required />
        </div>

        <!-- Leave Type -->
        <div>
          <label for="leave_type" class="block text-sm font-medium text-gray-700 mb-1">
            ប្រភេទនៃការឈប់សម្រាក (Types of Leave):
          </label>
          <select id="leave_type" name="leave_type"
            class="mt-1 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            <option value="annualLeave">ការឈប់សម្រាកប្រចាំឆ្នាំ (Annual Leave)</option>
            <option value="sickLeave">ការឈប់សម្រាកដោយជម្ងឺ (Sick Leave)</option>
            <option value="maternityLeave">ការឈប់សម្រាកលំហែមាតុភាព (Maternity Leave)</option>
            <option value="specialLeave">ការឈប់សម្រាកពិសេស (Special Leave)</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
        <div>
          <label for="start_date" class="block text-sm font-medium text-gray-700">សំណើសុំឈប់សម្រាកពីម៉ោង</label>

          <input type="date" id="start_date" name="start_date" value="{{ leave['start_date'] }}"
            class="w-full rounded-xl border border-gray-300 px-4 py-2 shadow-sm focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 focus:outline-none" />
        </div>

        <div>
          <label for="end_date" class="block text-sm font-medium text-gray-700">រហូតដល់ម៉ោង</label>
          <input type="date" id="end_date" name="end_date" value="{{ leave['end_date'] }}"
            class="w-full rounded-xl border border-gray-300 px-4 py-2 shadow-sm focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 focus:outline-none" />
        </div>
      </div>

      <!-- Reason -->
      <div>
        <label for="reason" class="block text-sm font-medium text-gray-700">មូលហេតុនៃការសុំឈប់សម្រាក (Reason for
          Leave)</label>
        <textarea id="reason" name="reason" rows="4" required
          class="w-full rounded-xl border border-gray-300 px-4 py-2 shadow-sm focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 focus:outline-none">{{ leave['reason'] }}</textarea>
      </div>

      <!-- Status -->
      <div>
        <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select id="status" name="status" required
          class="w-full rounded-xl border border-gray-300 px-4 py-2 shadow-sm focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 focus:outline-none">
          <option value="Approved" {% if leave['status'] is none or leave['status']=='Approved' %}selected{% endif %}>
            Approved</option>
          <option value="Rejected" {% if leave['status']=='Rejected' %}selected{% endif %}>Rejected</option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="flex justify-start space-x-2 pt-2">
        <button type="submit"
          class="inline-flex items-center px-5 py-2.5 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md transition duration-300 ease-in-out">
          <i class="fas fa-save mr-2"></i> Update Leave
        </button>
        <a href="{{ url_for('view_leaves') }}"
          class="inline-flex items-center px-5 py-2.5 text-sm font-medium text-white bg-gray-500 hover:bg-gray-600 rounded-xl shadow-md transition duration-300 ease-in-out">
          <i class="fas fa-arrow-left mr-2"></i> Back
        </a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
