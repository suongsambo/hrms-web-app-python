{% extends "base.html" %} {% block content %}
<div class="max-w-2xl mx-auto py-10 px-6">
    <div class="bg-white shadow-md rounded-lg p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">
            Import Leaves from Excel
        </h1>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %}
        <div class="space-y-2 mb-4">
            {% for category, message in messages %}
            <div
                class="p-3 rounded text-sm {% if category == 'success' %} bg-green-100 text-green-800 border border-green-300 {% elif category == 'error' %} bg-red-100 text-red-800 border border-red-300 {% else %} bg-gray-100 text-gray-800 border border-gray-300 {% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %} {% endwith %}

        <form method="post" enctype="multipart/form-data" class="space-y-6">
            <div>
                <label for="excel_file" class="block text-sm font-medium text-gray-700 mb-1">Select Excel File</label>
                <input type="file" name="excel_file" accept=".xlsx,.xls" required
                    class="file-input file-input-bordered w-full" />
            </div>

            <div class="flex gap-4">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-upload mr-2"></i>
                    Upload & Import
                </button>

                <a href="{{ url_for('view_leaves') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left mr-2"></i>
                    Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
