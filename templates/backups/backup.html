{% extends 'base.html' %} {% block title %} Add Bank Statement {% endblock %} {%
block content %}
<body class="bg-gray-100">
  <div class="container mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">
      HR Management Database
    </h1>

    <!-- Messages -->
    <div class="text-center mb-6">
      {% if message %}
      <p class="text-lg text-green-600">{{ message }}</p>
      {% endif %}
    </div>

    <!-- Backup Management Buttons -->
    <div class="flex justify-center space-x-6 mb-8">
      <form action="/backup" method="POST">
        <button
          type="submit"
          class="bg-blue-600 text-white px-2 py-1 rounded-lg hover:bg-blue-700 transition duration-300 flex items-center space-x-1 text-sm"
        >
          <span class="material-symbols-outlined">save</span>
          <span>Backup</span>
        </button>
      </form>
      <form action="/restore" method="POST">
        <button
          type="submit"
          class="bg-yellow-500 text-white px-2 py-1 rounded-lg hover:bg-yellow-600 transition duration-300 flex items-center space-x-1 text-sm"
        >
          <span class="material-symbols-outlined">restore</span>
          <span>Restore</span>
        </button>
      </form>
      <form action="/download" method="GET">
        <button
          type="submit"
          class="bg-green-500 text-white px-2 py-1 rounded-lg hover:bg-green-600 transition duration-300 flex items-center space-x-1 text-sm"
        >
          <span class="material-symbols-outlined">download</span>
          <span>Download</span>
        </button>
      </form>
      <button
        type="button"
        onclick="window.location.reload()"
        class="bg-yellow-500 text-white px-2 py-1 rounded-lg hover:bg-yellow-600 transition duration-300 flex items-center space-x-1 text-sm"
      >
        <span class="material-symbols-outlined">refresh</span>
        <span>Refresh</span>
      </button>
    </div>

    <!-- List of backups -->
    <h2 class="text-2xl font-semibold text-center text-gray-700 mb-4">
      Manage Backups
    </h2>

    <!-- Display list of backup files -->
    <div class="overflow-x-auto shadow-lg rounded-lg bg-white">
      <table
        id="backupTable"
        class="min-w-full table-auto text-gray-800 border-collapse"
      >
        <thead class="bg-gray-200">
          <tr class="border-b">
            <th class="px-6 py-3 text-left font-semibold text-lg">
              Backup Name
            </th>
            <th class="px-6 py-3 text-left font-semibold text-lg">Action</th>
          </tr>
        </thead>
        <tbody>
          {% for backup in backup_files %}
          <tr class="border-b hover:bg-gray-50">
            <td class="px-6 py-4">{{ backup }}</td>
            <td class="px-6 py-4">
              <div class="flex space-x-2">
                <!-- Restore Form -->
                <form action="/restore" method="POST" class="inline-block">
                  <input type="hidden" name="backup" value="{{ backup }}" />
                  <button
                    type="submit"
                    class="bg-yellow-500 text-white px-2 py-1 rounded-lg hover:bg-yellow-600 transition duration-300 flex items-center space-x-1 text-sm"
                  >
                    <span class="material-symbols-outlined">restore</span>
                    <span>Restore</span>
                  </button>
                </form>
                <!-- Delete Form -->
                <form action="/delete" method="POST" class="inline-block">
                  <input type="hidden" name="backup" value="{{ backup }}" />
                  <button
                    type="submit"
                    class="bg-red-500 text-white px-2 py-1 rounded-lg hover:bg-red-600 transition duration-300 flex items-center space-x-1 text-sm"
                  >
                    <span class="material-symbols-outlined">delete</span>
                    <span>Delete</span>
                  </button>
                </form>
                <!-- Download Form -->
                <form action="/download" method="GET" class="inline-block">
                  <input type="hidden" name="backup" value="{{ backup }}" />
                  <button
                    type="submit"
                    class="bg-green-500 text-white px-2 py-1 rounded-lg hover:bg-green-600 transition duration-300 flex items-center space-x-1 text-sm"
                  >
                    <span class="material-symbols-outlined">download</span>
                    <span>Download</span>
                  </button>
                </form>
              </div>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

  <!-- Initialize DataTable -->
  <script>
    $(document).ready(function () {
      $("#backupTable").DataTable();
    });
  </script>
</body>
{% endblock %}
