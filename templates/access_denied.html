<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Denied</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <style>
      body {
        background-color: #f8d7da;
        color: #721c24;
      }
      .container {
        margin-top: 100px;
        text-align: center;
      }
      .alert {
        padding: 20px;
        font-size: 1.5rem;
      }
      .undraw-img {
        max-width: 300px;
        margin-bottom: 30px;
      }
      .btn {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Undraw illustration (place your SVG in static/images/access_denied.svg) -->
      <img
        src="{{ url_for('static', filename='images/undraw_access-denied_krem.svg') }}"
        alt="Access Denied Illustration"
        class="undraw-img"
      />

      <div class="alert alert-danger" role="alert">
        <strong>Access Denied!</strong> {{ message }}
      </div>
      <a href="{{ url_for('index') }}" class="btn btn-primary"
        >Go to Homepage</a
      >
    </div>
  </body>
</html>
