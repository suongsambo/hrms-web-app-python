{% extends 'base.html' %} {% block title %}Force Reset Password{% endblock %} {%
block content %}

<body class="bg-gray-100 py-10">
  <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
    <h1 class="text-xl font-bold mb-4 text-center">Force Reset Password</h1>

    {% if error %}
    <div class="mb-4 p-3 bg-red-100 text-red-700 rounded">{{ error }}</div>
    {% endif %} {% if success %}
    <div class="mb-4 p-3 bg-green-100 text-green-700 rounded">
      {{ success }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-4">
      <div>
        <label class="block mb-1 font-medium">Email</label>
        <input
          type="email"
          name="email"
          class="w-full px-3 py-2 border rounded"
          required
        />
      </div>
      <div>
        <label class="block mb-1 font-medium">Username</label>
        <input
          type="text"
          name="username"
          class="w-full px-3 py-2 border rounded"
          required
        />
      </div>

      <div>
        <label class="block mb-1 font-medium">New Password</label>
        <div class="relative">
          <input
            type="password"
            name="new_password"
            id="new_password"
            class="w-full px-3 py-2 border rounded pr-10"
            required
          />
          <button
            type="button"
            onclick="togglePassword()"
            class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-600"
          >
            <!-- Eye icon (from Heroicons) -->
            <svg
              id="eye_icon"
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z"
              />
            </svg>
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
      >
        Reset Password
      </button>
    </form>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById("new_password");
      const icon = document.getElementById("eye_icon");
      if (input.type === "password") {
        input.type = "text";
        icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 013.054-4.418m4.958-2.245a10.05 10.05 0 014.418 3.054M3 3l18 18" />
                `;
      } else {
        input.type = "password";
        icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
                `;
      }
    }
  </script>
</body>
{% endblock %}
