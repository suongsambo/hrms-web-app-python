<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gradient-to-r from-blue-400 via-teal-500 to-green-400 h-screen flex items-center justify-center"
  >
    <div
      class="text-center bg-white p-12 rounded-lg shadow-2xl max-w-md mx-auto"
    >
      <!-- Add Undraw SVG illustration -->
      <div class="mb-6">
        <img
          src="{{ url_for('static', filename='images/undraw_warning_qn4r.svg') }}"
          alt="No files illustration"
          class="w-80 mx-auto mb-4"
        />
      </div>

      <h1 class="text-6xl font-extrabold text-gray-800 mb-4">404</h1>
      <p class="text-xl text-gray-600 mb-6">
        Oops! The page you're looking for doesn't exist.
      </p>
      <a
        href="/"
        class="inline-block px-8 py-4 text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-all transform hover:scale-105 hover:rotate-2 shadow-lg"
        >Go Login</a
      >
    </div>
  </body>
</html>
