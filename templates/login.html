<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.ico') }}" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
</head>

<body class="relative min-h-screen flex items-center justify-center">
  <div class="absolute inset-0 bg-cover bg-center bg-no-repeat"
    style="background-image: url('{{ url_for('static', filename='images/bg-login-city.jpg') }}');"></div>

  <!-- Overlay gradient -->
  <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-purple-700/40 to-indigo-700/60"></div>

  <!-- Form container -->
  <div class="relative z-10 w-full max-w-md p-4">
    <form method="post" action="{{ url_for('login') }}"
      class="bg-white/20 backdrop-blur-md rounded-2xl shadow-2xl p-8 space-y-6 border border-white/30">
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div>
        {% for category, message in messages %}
        <div
          class="p-3 rounded text-sm {% if category == 'error' %}bg-red-100 text-red-700 {% elif category == 'success' %}bg-green-100 text-green-700 {% elif category == 'warning' %}bg-yellow-100 text-yellow-700 {% else %}bg-gray-100 text-gray-700{% endif %}">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <h2 class="text-3xl font-bold text-center text-white drop-shadow">
        Login
      </h2>

      <!-- Username -->
      <div>
        <label class="block text-white/80 text-sm font-medium mb-1" for="username">Username</label>
        <div class="relative">
          <input type="text" id="username" name="username"
            class="w-full px-4 py-3 rounded-lg bg-white/60 backdrop-blur-sm border border-gray-300 shadow-inner focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800 pl-10"
            placeholder="Enter your username" />
          <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-white/80 text-sm font-medium mb-1" for="password">Password</label>
        <div class="relative">
          <input type="password" id="password" name="password"
            class="w-full px-4 py-3 rounded-lg bg-white/60 backdrop-blur-sm border border-gray-300 shadow-inner focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800 pl-10"
            placeholder="Enter your password" />
          <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
          <i id="togglePassword"
            class="fas fa-eye absolute right-3 top-1/2 transform -translate-y-1/2 cursor-pointer text-gray-500 hover:text-indigo-500 transition"
            onclick="togglePasswordVisibility()"></i>
        </div>
      </div>

      <!-- Remember Me -->
      <div class="flex items-center">
        <input type="checkbox" id="rememberMe" name="rememberMe" class="mr-2 accent-indigo-600" />
        <label for="rememberMe" class="text-sm text-white/80">Remember me</label>
      </div>

      <button type="submit"
        class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-700 text-white font-semibold rounded-lg shadow-md hover:shadow-xl hover:scale-105 transition transform duration-200 ease-in-out flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        <i class="fas fa-sign-in-alt mr-2"></i>
        Login
      </button>

      <p class="text-center text-sm text-white/80">
        Don't have an account?
        <a href="{{ url_for('register') }}"
          class="text-white font-semibold underline hover:text-indigo-300 transition">Register here</a>.
      </p>
    </form>
  </div>

  <script>
    function togglePasswordVisibility() {
      const passwordField = document.getElementById("password");
      const toggleIcon = document.getElementById("togglePassword");

      if (passwordField.type === "password") {
        passwordField.type = "text";
        toggleIcon.classList.remove("fa-eye-slash");
        toggleIcon.classList.add("fa-eye");
      } else {
        passwordField.type = "password";
        toggleIcon.classList.remove("fa-eye");
        toggleIcon.classList.add("fa-eye-slash");
      }
    }

    window.onload = function () {
      const passwordField = document.getElementById("password");
      const toggleIcon = document.getElementById("togglePassword");
      if (passwordField.type === "password") {
        toggleIcon.classList.remove("fa-eye");
        toggleIcon.classList.add("fa-eye-slash");
      }
    };
  </script>
</body>

</html>
