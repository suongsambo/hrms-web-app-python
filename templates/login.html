<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  </head>

  <body>
    <div
      class="flex items-center justify-center min-h-screen bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"
      style="min-width: 450px"
    >
      <form
        method="post"
        action="{{ url_for('login') }}"
        class="bg-white rounded-lg shadow-lg p-8 max-w-md mx-auto space-y-6"
      >
        <h2 class="text-3xl font-semibold text-center text-gray-800">Login</h2>

        <div class="mb-4">
          <label
            class="block text-gray-700 text-sm font-medium mb-2"
            for="username"
            >Username:</label
          >
          <input
            type="text"
            id="username"
            name="username"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-700"
          />
        </div>
        <div class="mb-6">
          <label
            class="block text-gray-700 text-sm font-medium mb-2"
            for="password"
            >Password:</label
          >
          <input
            type="password"
            id="password"
            name="password"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-700"
          />
        </div>
        <button
          type="submit"
          class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          Login
        </button>
        <p class="text-center mt-4 text-sm text-gray-600">
          Don't have an account?
          <a
            href="{{ url_for('register') }}"
            class="text-indigo-600 hover:text-indigo-700"
            >Register here</a
          >.
        </p>
      </form>
    </div>
    <script>
      function validateForm() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
          alert("Please fill in both username and password.");
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
