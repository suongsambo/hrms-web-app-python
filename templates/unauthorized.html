<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unauthorized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @tailwind base;
      @tailwind components;
      @tailwind utilities;

      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body
    class="bg-gradient-to-r from-blue-500 to-purple-600 h-screen flex items-center justify-center"
  >
    <div
      class="bg-white p-8 rounded-lg shadow-xl max-w-lg w-full text-center transform transition-transform hover:scale-105"
    >
      <h1 class="text-4xl font-extrabold text-gray-800 mb-6">
        Unauthorized Access
      </h1>
      <p class="text-lg text-gray-700 mb-6">
        You do not have permission to view this page.
      </p>
      <p class="text-lg text-gray-700 mb-6">
        Please login to view the content of this page.
      </p>

      <!-- Undraw Illustration -->
      <img
        src="{{ url_for('static', filename='images/undraw_access-denied_krem.svg') }}"
        alt="Unauthorized Access Illustration"
        class="mx-auto mb-6 max-w-lg"
      />

      <form action="{{ url_for('logout') }}" method="post" class="mt-6">
        <button
          type="submit"
          class="bg-blue-600 hover:bg-blue-800 text-white font-bold py-3 px-6 rounded-lg transition-all duration-300 ease-in-out transform hover:scale-105 flex items-center justify-center space-x-2"
        >
          <!-- Logout Icon -->
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </form>
    </div>
  </body>
</html>
