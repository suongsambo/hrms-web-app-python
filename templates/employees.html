<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=print" />
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </head>
  <body>
    <header class="bg-gray-800 text-white">
      <nav class="container mx-auto px-4 py-2">
        <ul class="flex space-x-4">
          <li class="flex items-center justify-center">
            <a href="/" class="hover:text-gray-400">Home</a>
          </li>
          <li class="flex items-center justify-center">
            <a href="/employees/add" class="hover:text-gray-400">Employee</a>
          </li>

          <div class="relative" x-data="{ open: false }">
            <button
              class="hover:text-gray-400 bg-gray-800 text-white px-4 py-2 rounded-md"
              type="button"
              id="dropdownMenuButton"
              @click="open = !open"
              :class="{ 'bg-gray-700': open }"
            >
              Setting
            </button>
            <ul
              class="absolute z-10 w-44 bg-white rounded divide-y divide-gray-100 shadow dark:bg-gray-700"
              x-show="open"
              @click.away="open = false"
              id="dropdownMenu"
              data-dropdown
            >
              <li>
                <a
                  href="/register"
                  class="block py-2 px-4 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-white"
                  >Register</a
                >
              </li>
              <li>
                <form
                  action="{{ url_for('logout') }}"
                  method="post"
                  class="block py-2 px-4 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-white"
                >
                  <button type="submit" class="w-full text-left">Logout</button>
                </form>
              </li>
            </ul>
          </div>
        </ul>
      </nav>
    </header>
    <main>
      <div class="container mx-auto py-8">
        <h2 class="text-2xl font-bold mb-6 text-left">Employee List</h2>

        <form
          action="{{ url_for('search_employees') }}"
          method="get"
          class="flex items-center mb-4"
        >
          <input
            type="text"
            name="query"
            placeholder="Search employees..."
            value="{{ request.args.get('query', '') }}"
            class="flex-1 px-4 py-2 border rounded-md"
          />
          <button
            type="submit"
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
          >
            Search
          </button>
        </form>

        <div class="flex justify-end mb-4 space-x-2">
            <button
            type="button"
            onclick="printTable()"
            class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded"
          >
          <span class="material-symbols-outlined">
            print
            </span>
          </button>
          <button
            type="button"
            onclick="window.location.reload()"
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
          >
            Refresh
          </button>
          <a
            href="{{ url_for('add_employee') }}"
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
          >
            Add Employee
          </a>
        </div>

      
        <script>
          function printTable() {
            let table = document.querySelector(".min-w-full").cloneNode(true);

            // Remove the last column from the header
            table
              .querySelectorAll("thead tr th:last-child")
              .forEach((th) => th.remove());

            // Remove the last column from all rows in tbody
            table.querySelectorAll("tbody tr").forEach((tr) => {
              tr.querySelectorAll("td:last-child").forEach((td) => td.remove());
            });

            // Add a header with company name and location
            let date = new Date();
            let header = document.createElement("div");
            header.classList.add("text-center", "mb-4");
            header.innerHTML = `
                <h1 class="text-3xl font-bold">KPCC</h1>
                <p>Port Phillip, Victoria, Australia</p>
                <p>${date.toLocaleDateString()}</p>
            `;

            // Add a footer with note
            let footer = document.createElement("p");
            footer.classList.add("text-center", "mt-4");
            footer.innerHTML = `
                Note: Data export from system HRMS.
            `;

            // Open a new window and print
            let newWin = window.open("", "", "width=800,height=600");
            newWin.document.write(`
                <html>
                    <head>
                        <title>Print Employees</title>
                        <style>
                            body { padding: 24px; font-family: Arial, sans-serif; }
                            table { width: 100%; border-collapse: collapse; }
                            th, td { border: 1px solid #ddd; padding: 8px; }
                            th { background-color: #f4f4f4; text-align: left; }
                            tr:nth-child(even) { background-color: #f9f9f9; }
                        </style>
                    </head>
                    <body>
                        ${header.outerHTML}
                        ${table.outerHTML}
                        ${footer.outerHTML}
                        <script>window.onload = function() { window.print(); window.close(); }<\/script>
                    </body>
                </html>
            `);
            newWin.document.close();
          }
        </script>

        <div class="overflow-x-auto">
          <table class="min-w-full bg-white shadow-md rounded-lg">
            <thead class="bg-gray-800 text-white">
              <tr>
                <th class="py-2 px-4 text-left">ID</th>
                <th class="py-2 px-4 text-left">Name</th>
                <th class="py-2 px-4 text-left">Age</th>
                <th class="py-2 px-4 text-left">Department</th>
                <th class="py-2 px-4 text-left">Salary</th>
                <th class="py-2 px-4 text-center">Actions</th>
              </tr>
            </thead>
            <tbody>
              {% for employee in employees %}
              <tr class="border-b">
                <td class="py-2 px-4">{{ employee.id }}</td>
                <td class="py-2 px-4">{{ employee.name }}</td>
                <td class="py-2 px-4">{{ employee.age }}</td>
                <td class="py-2 px-4">{{ employee.department }}</td>
                <td class="py-2 px-4">${{ employee.salary }}</td>
                <td class="py-2 px-4 text-center">
                  <a
                    href="{{ url_for('edit_employee', id=employee.id) }}"
                    class="text-blue-500 hover:underline mr-2"
                    >Edit</a
                  >
                  <form
                    class="inline-block text-red-500 hover:underline"
                    action="{{ url_for('delete_employee', id=employee.id) }}"
                    method="POST"
                  >
                    <button
                      type="submit"
                      class="text-red-500 hover:underline"
                      onclick="return confirm('Are you sure you want to delete this employee?')"
                    >
                      Delete
                    </button>
                  </form>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </body>
</html>
