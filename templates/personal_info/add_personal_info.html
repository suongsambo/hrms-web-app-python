{% extends 'base.html' %} {% block title %}Add Personal Info{% endblock %} {%
block content %}
<div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-md">
  <h2 class="text-2xl font-semibold mb-6">Add Personal Info</h2>

  <form
    method="POST"
    action="{{ url_for('add_personal_info') }}"
    enctype="multipart/form-data"
    class="space-y-4"
  >
    <!-- First Name Khmer -->
    <div>
      <label for="first_name_kh" class="block text-sm font-medium text-gray-700"
        >First Name (Khmer)</label
      >
      <input
        type="text"
        name="first_name_kh"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Last Name Khmer -->
    <div>
      <label for="last_name_kh" class="block text-sm font-medium text-gray-700"
        >Last Name (Khmer)</label
      >
      <input
        type="text"
        name="last_name_kh"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- First Name English -->
    <div>
      <label for="first_name_en" class="block text-sm font-medium text-gray-700"
        >First Name (English)</label
      >
      <input
        type="text"
        name="first_name_en"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Last Name English -->
    <div>
      <label for="last_name_en" class="block text-sm font-medium text-gray-700"
        >Last Name (English)</label
      >
      <input
        type="text"
        name="last_name_en"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Mobile -->
    <div>
      <label for="mobile" class="block text-sm font-medium text-gray-700"
        >Mobile</label
      >
      <input
        type="text"
        name="mobile"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Mobile 2 -->
    <div>
      <label for="mobile2" class="block text-sm font-medium text-gray-700"
        >Mobile 2</label
      >
      <input
        type="text"
        name="mobile2"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
      />
    </div>

    <!-- Identity -->
    <div>
      <label for="identity" class="block text-sm font-medium text-gray-700"
        >Identity</label
      >
      <input
        type="text"
        name="identity"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Passport -->
    <div>
      <label for="passport" class="block text-sm font-medium text-gray-700"
        >Passport</label
      >
      <input
        type="text"
        name="passport"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Age -->
    <div>
      <label for="age" class="block text-sm font-medium text-gray-700"
        >Age</label
      >
      <input
        type="number"
        name="age"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Gender -->
    <div>
      <label for="gender" class="block text-sm font-medium text-gray-700"
        >Gender</label
      >
      <select
        name="gender"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      >
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- Place of Birth -->
    <div>
      <label
        for="place_of_birth"
        class="block text-sm font-medium text-gray-700"
        >Place of Birth</label
      >
      <input
        type="text"
        name="place_of_birth"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Date of Birth -->
    <div>
      <label for="date_of_birth" class="block text-sm font-medium text-gray-700"
        >Date of Birth</label
      >
      <input
        type="date"
        name="date_of_birth"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        required
      />
    </div>

    <!-- Fingerprints -->
    <div>
      <label for="fingerprints" class="block text-sm font-medium text-gray-700"
        >Upload Fingerprints Image</label
      >
      <input
        type="file"
        name="fingerprints"
        accept="image/*"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
      />
    </div>

    <!-- Signature -->
    <div>
      <label for="signature" class="block text-sm font-medium text-gray-700"
        >Upload Signature Image</label
      >
      <input
        type="file"
        name="signature"
        accept="image/*"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
      />
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      class="mt-6 w-full bg-blue-500 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-600"
    >
      Add Personal Info
    </button>
  </form>
</div>
{% endblock %}
