{% extends 'base.html' %} {% block title %}Edit Personal Info{% endblock %} {%
block content %}
<div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-md">
  <h2 class="text-2xl font-semibold mb-6">Edit Personal Info</h2>

  <form
    method="POST"
    action="{{ url_for('edit_personal_info', id=info.id) }}"
    class="space-y-4"
  >
    <div>
      <label for="first_name_kh" class="block text-sm font-medium text-gray-700"
        >First Name (Khmer)</label
      >
      <input
        type="text"
        name="first_name_kh"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        value="{{ info.first_name_kh }}"
        required
      />
    </div>
    <div>
      <label for="last_name_kh" class="block text-sm font-medium text-gray-700"
        >Last Name (Khmer)</label
      >
      <input
        type="text"
        name="last_name_kh"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        value="{{ info.last_name_kh }}"
        required
      />
    </div>
    <!-- Similar fields for all the other inputs go here -->

    <button
      type="submit"
      class="mt-6 w-full bg-blue-500 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-600"
    >
      Update Personal Info
    </button>
  </form>
</div>
{% endblock %}
