<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=settings" />
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </head>
  <body>
    <header class="bg-gray-800 text-white">
      <nav class="container mx-auto px-4 py-2">
        <ul class="flex space-x-4">
          <li class="flex items-center justify-center">
          Home
          </li>
          <li class="flex items-center justify-center">
            <a href="/employees" class="hover:text-gray-400">Employee</a>
          </li>

          <div class="relative" x-data="{ open: false }">
            <button
              class="hover:text-gray-400 bg-gray-800 text-white px-4 py-2 rounded-md"
              type="button"
              id="dropdownMenuButton"
              @click="open = !open"
              :class="{ 'bg-gray-700': open }"
            >
              <!-- Setting -->
              <a href="/" class="hover:text-gray-400">
                <span class="material-symbols-outlined">
                  settings
                  </span>
              </a>
            </button>
            <ul
              class="absolute z-10 w-44 bg-white rounded divide-y divide-gray-100 shadow dark:bg-gray-700"
              x-show="open"
              @click.away="open = false"
              id="dropdownMenu"
              data-dropdown
            >
              <li>
                <a
                  href="/register"
                  class="block py-2 px-4 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-white"
                  >Register</a
                >
              </li>
              <li>
                <form
                  action="{{ url_for('logout') }}"
                  method="post"
                  class="block py-2 px-4 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-white"
                >
                  <button type="submit" class="w-full text-left">Logout</button>
                </form>
              </li>
            </ul>
          </div>
        </ul>
      </nav>
    </header>
    <main>
      <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-4">Dashboard</h1>
        <div class="grid grid-cols-3 gap-4">
          <div class="bg-white rounded shadow p-4">
            <h2 class="text-lg font-bold mb-2">Total Employees</h2>
            <p class="text-2xl font-bold">{{ total_employees }}</p>
          </div>
          <div class="bg-white rounded shadow p-4">
            <h2 class="text-lg font-bold mb-2">Average Age</h2>
            <p class="text-2xl font-bold">{{ average_age }}</p>
          </div>
          <div class="bg-white rounded shadow p-4">
            <h2 class="text-lg font-bold mb-2">Total Salary</h2>
            <p class="text-2xl font-bold">${{ total_salary }}</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
