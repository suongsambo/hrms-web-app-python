{% extends 'base.html' %} {% block title %}Users{% endblock %} {% block content
%}

<body class="bg-gray-100 font-sans text-gray-900">
  <div class="container mx-auto p-8">
    <!-- Heading -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-indigo-600">
        Welcome to the Chat Room
      </h1>
      <h2 id="username" class="text-lg text-gray-700 mt-2">
        {{ current_user.username }}
      </h2>
    </div>

    <!-- Private Message Section -->
    <div class="mb-6 p-4 bg-white shadow-md rounded-lg">
      <h3 class="text-xl font-semibold mb-4 text-gray-800">
        Send a Private Message
      </h3>
      <div class="flex space-x-4">
        <input
          type="text"
          id="recipient"
          placeholder="Recipient's Username"
          class="p-3 border border-gray-300 rounded-lg w-1/3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <input
          type="text"
          id="privateMessageInput"
          placeholder="Type your private message..."
          class="p-3 border border-gray-300 rounded-lg w-2/3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>
      <button
        id="sendPrivateMessageButton"
        class="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      >
        Send Private Message
      </button>
    </div>

    <!-- Room Join/Leave Section -->
    <div class="mb-6 p-4 bg-white shadow-md rounded-lg">
      <h3 class="text-xl font-semibold mb-4 text-gray-800">
        Join or Leave a Room
      </h3>
      <div class="flex space-x-4 mb-4">
        <input
          type="text"
          id="roomInput"
          placeholder="Enter room name"
          class="p-3 border border-gray-300 rounded-lg w-1/3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>
      <div class="space-x-4">
        <button
          id="joinRoomButton"
          class="px-6 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-500"
        >
          Join Room
        </button>
        <button
          id="leaveRoomButton"
          class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-500"
          style="display: none"
        >
          Leave Room
        </button>
      </div>
    </div>

    <!-- Chat Messages Section -->
    <div
      id="chatbox"
      class="bg-white shadow-md rounded-lg p-4 mb-6 h-96 overflow-y-auto border border-gray-300"
      style="color: black"
    >
      {% for message in messages %}
      <p>{{ message }}</p>
      {% endfor %}
    </div>

    <!-- Message Input Section -->
    <div class="flex space-x-4 items-center">
      <!-- Message Input -->
      <input
        type="text"
        id="messageInput"
        placeholder="Type your message..."
        class="p-4 border border-gray-300 rounded-xl w-4/5 text-gray-800 placeholder-gray-500 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-50 transition-all duration-200 ease-in-out"
      />

      <!-- Send Button -->
      <button
        id="sendButton"
        class="flex items-center px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-50 transition-all duration-200 ease-in-out"
      >
        <span class="material-symbols-outlined mr-2">send</span>
        <span class="font-semibold text-lg">Send</span>
      </button>
    </div>
  </div>

  <script>
    const socket = io(); // Connect to the server

    // Display the logged-in username
    document.getElementById("username").textContent = "User: {{ username }}"; // Dynamically set by Flask

    // Handle sending a private message
    document
      .getElementById("sendPrivateMessageButton")
      .addEventListener("click", function () {
        const recipient = document.getElementById("recipient").value;
        const privateMessage = document.getElementById(
          "privateMessageInput"
        ).value;

        if (recipient && privateMessage) {
          const sender = "{{ username }}"; // Dynamically get the username from Flask
          const timestamp = new Date().toISOString();

          console.log("Sending private message to:", recipient);
          console.log("Message:", privateMessage);

          // Emit private message to the server
          socket.emit("private_message", {
            recipient: recipient,
            message: privateMessage,
            timestamp: timestamp,
            sender: sender, // Add sender to data
          });
          document.getElementById("privateMessageInput").value = ""; // Clear input field
        } else {
          alert("Recipient and message cannot be empty.");
        }
      });

    // Handle incoming private messages
    socket.on("private_message", function (data) {
      const chatbox = document.getElementById("chatbox");
      const newMessage = document.createElement("div");
      newMessage.textContent = `[Private from ${data.sender}] [${data.timestamp}] ${data.message}`;
      chatbox.appendChild(newMessage);
      chatbox.scrollTop = chatbox.scrollHeight; // Scroll to the bottom
    });

    // Handle Join Room
    document
      .getElementById("joinRoomButton")
      .addEventListener("click", function () {
        const room = document.getElementById("roomInput").value;
        if (room) {
          console.log("Joining room:", room);
          socket.emit("join_room", { room: room });
          document.getElementById("leaveRoomButton").style.display = "inline"; // Show Leave button
          document.getElementById("joinRoomButton").style.display = "none"; // Hide Join button
        } else {
          alert("Please enter a room name.");
        }
      });

    // Handle Leave Room
    document
      .getElementById("leaveRoomButton")
      .addEventListener("click", function () {
        const room = document.getElementById("roomInput").value;
        if (room) {
          console.log("Leaving room:", room);
          socket.emit("leave_room", { room: room });
          document.getElementById("leaveRoomButton").style.display = "none"; // Hide Leave button
          document.getElementById("joinRoomButton").style.display = "inline"; // Show Join button
        }
      });

    // Handle sending a chat message to the room
    document
      .getElementById("sendButton")
      .addEventListener("click", function () {
        const message = document.getElementById("messageInput").value;
        const room = document.getElementById("roomInput").value;
        const username = "{{ username }}"; // Dynamically get the username from Flask
        const timestamp = new Date().toISOString();

        if (message && room) {
          console.log("Sending message:", message, "to room:", room);
          socket.emit("chat_message", {
            room: room,
            username: username,
            message: message,
            timestamp: timestamp,
          });
          document.getElementById("messageInput").value = ""; // Clear the input field
        } else {
          alert("Please enter a message and room name.");
        }
      });

    // Handle incoming room messages (user joins/leaves)
    socket.on("room_message", function (data) {
      const chatbox = document.getElementById("chatbox");
      const newMessage = document.createElement("div");
      newMessage.textContent = data.message;
      chatbox.appendChild(newMessage);
      chatbox.scrollTop = chatbox.scrollHeight; // Scroll to the bottom
    });

    socket.on("chat_message", function (data) {
      const chatbox = document.getElementById("chatbox");

      // Create a new div for the chat message
      const newMessage = document.createElement("div");

      // Build the message content
      newMessage.innerHTML = `
        <div class="flex items-start space-x-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-green-500 flex items-center justify-center text-white">
            <span class="text-xl font-semibold">${data.username.charAt(
              0
            )}</span>
          </div>
          <div class="flex-1">
            <div class="flex items-center justify-between">
              <span class="font-semibold text-gray-800">${data.username}</span>
              <span class="text-sm text-gray-500">${data.timestamp}</span>
            </div>
            <p class="text-gray-800 mt-1">${data.message}</p>
          </div>
        </div>
      `;

      // Apply some classes for spacing and styling
      newMessage.classList.add(
        "text-black",
        "p-3",
        "bg-white",
        "rounded-lg",
        "shadow-sm"
      );

      // Append the new message to the chatbox
      chatbox.appendChild(newMessage);

      // Scroll to the bottom of the chatbox (for real-time updates)
      chatbox.scrollTop = chatbox.scrollHeight;
    });

    // Fetch the last 50 messages from the chat room when the page loads
    fetch("/chat/history")
      .then((response) => response.json())
      .then((messages) => {
        const chatbox = document.getElementById("chatbox");
        messages.forEach((message) => {
          const newMessage = document.createElement("div");
          newMessage.textContent = `[${message.timestamp}] ${message.username}: ${message.message}`;
          newMessage.className = "text-black"; // Add text color
          chatbox.appendChild(newMessage);
        });
        chatbox.scrollTop = chatbox.scrollHeight; // Scroll to the bottom
      })
      .catch((error) => {
        console.error("Error fetching chat history:", error);
      });
  </script>
</body>
{% endblock %}
