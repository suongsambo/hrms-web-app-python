{% extends 'base.html' %} {% block title %}Employees{% endblock %} {% block
content %}

<div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
  <form
    method="POST"
    action="{{ url_for('change_password') }}"
    class="space-y-6"
    id="password-form"
  >
    <div class="space-y-2">
      <label for="old_password" class="block text-sm font-medium text-gray-700"
        >Old Password</label
      >
      <div class="relative">
        <input
          type="password"
          id="old_password"
          name="old_password"
          required
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
        />
        <button
          type="button"
          onclick="togglePasswordVisibility('old_password')"
          class="absolute right-3 top-3"
        >
          <i class="fas fa-eye-slash" id="old_password_icon"></i>
        </button>
      </div>
    </div>

    <div class="space-y-2">
      <label for="new_password" class="block text-sm font-medium text-gray-700"
        >New Password</label
      >
      <div class="relative">
        <input
          type="password"
          id="new_password"
          name="new_password"
          required
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
        />
        <button
          type="button"
          onclick="togglePasswordVisibility('new_password')"
          class="absolute right-3 top-3"
        >
          <i class="fas fa-eye-slash" id="new_password_icon"></i>
        </button>
      </div>
    </div>

    <div class="space-y-2">
      <label
        for="confirm_password"
        class="block text-sm font-medium text-gray-700"
        >Confirm New Password</label
      >
      <div class="relative">
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          required
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
        />
        <button
          type="button"
          onclick="togglePasswordVisibility('confirm_password')"
          class="absolute right-3 top-3"
        >
          <i class="fas fa-eye-slash" id="confirm_password_icon"></i>
        </button>
      </div>
    </div>

    <div class="space-y-2">
      <span class="text-red-500 text-sm">
        {% if confirm_password_error %} {{ confirm_password_error }} {% endif %}
      </span>
      {% if message %}
      <div class="bg-green-100 rounded-lg p-4 text-green-700">
        <p class="font-bold">{{ message }}</p>
      </div>
      {% endif %}
    </div>

    <button
      type="submit"
      class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded flex items-center space-x-1"
    >
      <span class="material-symbols-outlined">key</span>
      <span>Change Password</span>
    </button>
  </form>

  <script>
    function togglePasswordVisibility(id) {
      const input = document.getElementById(id);
      const icon = document.getElementById(id + "_icon");

      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      } else {
        input.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      }
    }

    // Check the old password via AJAX before allowing form submission
    function checkPasswordMatch(event) {
      event.preventDefault(); // Prevent form submission

      const oldPassword = document.getElementById("old_password").value;

      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/validate_old_password", true);
      xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");

      xhr.onload = function () {
        if (xhr.status === 200) {
          const response = JSON.parse(xhr.responseText);

          if (response.valid) {
            // If old password is valid, submit the form
            document.getElementById("password-form").submit();
          } else {
            alert("Old password is incorrect!");
          }
        } else {
          alert("An error occurred while validating the old password!");
        }
      };

      xhr.send("old_password=" + encodeURIComponent(oldPassword));

      return false; // Prevent form submission until AJAX request is complete
    }

    // Attach the checkPasswordMatch function to the form submit event
    document
      .getElementById("password-form")
      .addEventListener("submit", checkPasswordMatch);
  </script>
</div>

{% endblock %}
