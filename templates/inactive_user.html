<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Inactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gradient-to-br from-gray-100 to-blue-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-2xl rounded-2xl p-10 max-w-md w-full text-center animate-fade-in">
        <div class="flex justify-center items-center mb-6">
            <div class="bg-red-100 p-4 rounded-full">
                <svg class="h-10 w-10 text-red-600" fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v2m0 4h.01M21 12A9 9 0 1 1 3 12a9 9 0 0 1 18 0Z" />
                </svg>
            </div>
        </div>

        <h2 class="text-3xl font-bold text-gray-800 mb-3">Account Inactive</h2>
        <p class="text-gray-600 mb-8 leading-relaxed">
            Your account is currently inactive.<br />
            Please contact the system administrator for assistance.
        </p>

        <form action="{{ url_for('logout') }}" method="post">
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-transform transform hover:scale-105 flex items-center justify-center gap-2 shadow-md">
                <i class="fas fa-sign-out-alt"></i>
                Return to Login
            </button>
        </form>
    </div>

    <!-- Optional simple fade-in animation -->
    <style>
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
