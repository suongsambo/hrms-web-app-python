<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Users</title>
  </head>
  <body>
    <h1>Online Users</h1>
    <ul>
      {% for user in online_users %}
      <li>
        {{ user['UserName'] }} - {{ user['Email'] }} (Last Active: {{
        user['last_active_time'] }})
      </li>
      {% else %}
      <li>No users online.</li>
      {% endfor %}
    </ul>
  </body>
</html>
