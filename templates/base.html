<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap">
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>

<body>
    <header class="bg-gray-800 text-white">
        <nav class="container mx-auto px-4 py-2">
            <ul class="flex space-x-4">
                <li class="flex items-center justify-center">
                    <a href="/dashboard" class="hover:text-gray-400">Home</a>
                </li>

                <li class="flex items-center justify-center">
                    <a href="/users" class="hover:text-gray-400">Users</a>
                </li>

                <li class="flex items-center justify-center">
                    <a href="/employees" class="hover:text-gray-400">Employee</a>
                </li>

                <div class="relative ml-auto" x-data="{ open: false }">
                    <button class="hover:text-gray-400 bg-gray-800 text-white px-4 py-2 rounded-md" type="button"
                        @click="open = !open">
                        <span class="material-symbols-outlined">settings</span>
                    </button>
                    <ul class="absolute z-10 w-44 bg-white rounded divide-y divide-gray-100 shadow dark:bg-gray-700 right-0"
                        x-show="open" @click.away="open = false">

                        <li>
                            <form action="{{ url_for('logout') }}" method="post"
                                class="block py-2 px-4 text-sm text-gray-700 hover:bg-gray-100">
                                <button type="submit" class="w-full text-left"
                                    onclick="return confirm('Are you sure you want to logout?');">Logout</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </ul>
        </nav>
    </header>

    <main class="container mx-auto" style="min-height: calc(100vh - 102px); ">
        {% block content %}
        <!-- Content will be inserted here from child templates -->
        {% endblock %}
    </main>

</body>
{% block scripts %}
<footer class="bg-gradient-to-r from-gray-800 to-gray-600 text-white py-2">
    <div class="container mx-auto text-center">
        <div class="flex flex-col sm:flex-row justify-between items-center">
            <div class="mb-4 sm:mb-0">
                <p>&copy; 2025 Your Company. All rights reserved.</p>
            </div>
            <div class="flex space-x-4">
                <a href="#" class="text-gray-400 hover:text-white">Privacy Policy</a>
                <a href="#" class="text-gray-400 hover:text-white">Terms of Service</a>
                <a href="#" class="text-gray-400 hover:text-white">Contact Us</a>
            </div>
        </div>
    </div>
</footer>

{% endblock %}

</html>
