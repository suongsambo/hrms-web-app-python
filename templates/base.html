<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}" />
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>

<header class="bg-gray-800 text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
        <a href="/" class="flex items-center gap-x-2">
            <img src="/static/images/logo.png" alt="Company Logo" class="h-8 w-auto">
            <span class="text-2xl font-semibold">Company</span>
        </a>
        <div class="flex space-x-4 items-center">
            <form action="{{ url_for('logout') }}" method="post"
                class="block py-2 px-4 text-sm text-gray-white hover:bg-gray-200 flex items-center gap-x-2">
                <span class="material-symbols-outlined">logout</span>
                <button type="submit" class="w-full text-left"
                    onclick="return confirm('Are you sure you want to logout?');">Logout</button>
            </form>
        </div>
    </div>
</header>

<body class="flex flex-col">
    <!-- Sidebar -->
    <div class="flex-1 flex">
        <div x-data="{ sidebarOpen: true, lang: 'en', translations: {
                en: {
                    home: 'Home',
                    users: 'Users',
                    addUser: 'Add User',
                    manageUsers: 'Manage Users',
                    employees: 'Employees',
                    addEmployee: 'Add Employee',
                    manageEmployees: 'Manage Employees',
                    branches: 'Branches',
                    addBranch: 'Add Branch',
                    manageBranches: 'Manage Branches',
                    settings: 'Settings',
                    profile: 'Profile',
                    security: 'Security'
                },
                km: {
                    home: 'ទំព័រដើម',
                    users: 'អ្នកប្រើប្រាស់',
                    addUser: 'បន្ថែមអ្នកប្រើប្រាស់',
                    manageUsers: 'គ្រប់គ្រងអ្នកប្រើប្រាស់',
                    employees: 'បុគ្គលិក',
                    addEmployee: 'បន្ថែមបុគ្គលិក',
                    manageEmployees: 'គ្រប់គ្រងបុគ្គលិក',
                    branches: 'សាខា',
                    addBranch: 'បន្ថែមសាខា',
                    manageBranches: 'គ្រប់គ្រងសាខា',
                    settings: 'ការកំណត់',
                    profile: 'ប្រវត្តិរូប',
                    security: 'សន្តិសុខ'
                }
            } }" :class="{ 'hidden': !sidebarOpen }" class="w-90 h-screen bg-gray-900 text-white p-4">



            <!-- 
            <button @click="lang = lang === 'en' ? 'km' : 'en'; localStorage.setItem('lang', lang)"
                class="mb-4 bg-gray-800 text-white px-4 py-2 rounded flex items-center justify-center space-x-1 transition duration-200 ease-in-out hover:bg-gray-700 focus:outline-none focus:shadow-outline">
                <span x-text="lang === 'en' ? 'Switch to Khmer' : 'Switch to English'"></span>
                <span class="material-symbols-outlined" x-show="lang === 'en'">language</span>
                <span class="material-symbols-outlined" x-show="lang === 'km'">translate</span>
            </button> -->


            <button @click="lang = lang === 'en' ? 'km' : 'en'"
                class="mb-4 bg-gray-800 text-white px-4 py-2 rounded flex items-center justify-center space-x-2 transition duration-200 ease-in-out hover:bg-gray-700 focus:outline-none focus:shadow-outline">


                <span x-text="lang === 'en' ? 'ភាសាខ្មែរ' : 'English'"></span>


                <span x-show="lang === 'en'" class="text-xl">🇬🇧</span>


                <span x-show="lang === 'km'" class="text-xl">🇰🇭</span>


            </button>

            <ul>
                <li class="mb-2">
                    <a href="/dashboard" class="block p-2 hover:bg-gray-700 rounded flex items-center">
                        <span class="material-symbols-outlined">home</span>
                        <span class="ml-2" x-text="translations[lang].home"></span>
                    </a>
                </li>

                <li class="mb-2">
                    <button onclick="toggleMenu('submenu1')"
                        class="w-full text-left p-2 hover:bg-gray-700 rounded flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="material-symbols-outlined">groups</span>
                            <span class="text-left ml-3" x-text="translations[lang].users"></span>
                        </div>
                        <span>&#9662;</span>
                    </button>
                    <ul id="submenu1" class="hidden pl-4">
                        <li class="mb-2"><a href="/users/add"
                                class="block p-2 hover:bg-gray-700 rounded flex items-center">
                                <span class="material-symbols-outlined">person_add</span>
                                <span class="ml-2" x-text="translations[lang].addUser"></span>
                            </a></li>
                        <li><a href="/users" class="block p-2 hover:bg-gray-700 rounded flex items-center">
                                <span class="material-symbols-outlined">people</span>
                                <span class="ml-2" x-text="translations[lang].manageUsers"></span>
                            </a></li>
                    </ul>
                </li>

                <li class="mb-2">
                    <button onclick="toggleMenu('submenu2')"
                        class="w-full text-left p-2 hover:bg-gray-700 rounded flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="material-symbols-outlined">person</span>
                            <span class="text-left ml-3" x-text="translations[lang].employees"></span>
                        </div>
                        <span>&#9662;</span>
                    </button>
                    <ul id="submenu2" class="hidden pl-4">
                        <li class="mb-2"><a href="/employees/add"
                                class="block p-2 hover:bg-gray-700 rounded flex items-center">
                                <span class="material-symbols-outlined">person_add</span>
                                <span class="ml-2" x-text="translations[lang].addEmployee"></span>
                            </a></li>
                        <li><a href="/employees" class="block p-2 hover:bg-gray-700 rounded flex items-center">
                                <span class="material-symbols-outlined">people</span>
                                <span class="ml-2" x-text="translations[lang].manageEmployees"></span>
                            </a></li>
                    </ul>
                </li>

                <li class="mb-2">
                    <button onclick="toggleMenu('submenu3')"
                        class="w-full text-left p-2 hover:bg-gray-700 rounded flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="material-symbols-outlined">storefront</span>
                            <span class="text-left ml-3" x-text="translations[lang].branches"></span>
                        </div>
                        <span>&#9662;</span>
                    </button>
                    <ul id="submenu3" class="hidden pl-4">
                        <li class="mb-2"><a href="/branches/add"
                                class="block p-2 hover:bg-gray-700 rounded flex items-center">
                                <span class="material-symbols-outlined">storefront</span>
                                <span class="ml-2" x-text="translations[lang].addBranch"></span>
                            </a></li>
                        <li><a href="/branches" class="block p-2 hover:bg-gray-700 rounded flex items-center">
                                <span class="material-symbols-outlined">storefront</span>
                                <span class="ml-2" x-text="translations[lang].manageBranches"></span>
                            </a></li>
                    </ul>
                </li>

                <li class="mb-2">
                    <button onclick="toggleMenu('submenu4')"
                        class="w-full text-left p-2 hover:bg-gray-700 rounded flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="material-symbols-outlined">settings</span>
                            <span class="text-left ml-3" x-text="translations[lang].settings"></span>
                        </div>
                        <span>&#9662;</span>
                    </button>
                    <ul id="submenu4" class="hidden pl-4">
                        <li class="mb-2"><a href="#" class="block p-2 hover:bg-gray-700 rounded flex items-center">
                                <span class="material-symbols-outlined">person</span>
                                <span class="ml-2" x-text="translations[lang].profile"></span>
                            </a></li>
                        <li><a href="#" class="block p-2 hover:bg-gray-700 rounded flex items-center">
                                <span class="material-symbols-outlined">lock</span>
                                <span class="ml-2" x-text="translations[lang].security"></span>
                            </a></li>
                    </ul>
                </li>
            </ul>
        </div>
        <!-- Main Content -->
        <div class="flex-1 p-6">
            <!-- <button @click="sidebarOpen = !sidebarOpen" class="mb-4 bg-gray-800 text-white px-4 py-2 rounded">
                Toggle Sidebar
            </button> -->
            <main>
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script>
        function toggleMenu(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        if (localStorage.getItem('lang') === 'km') {
            document.querySelector('[x-data]')._x_data.lang = 'km';
        }
    </script>
</body>

{% block scripts %}
<footer class="bg-gradient-to-r from-gray-800 to-gray-600 text-white py-2">
    <div class="container mx-auto text-center">
        <div class="flex flex-col sm:flex-row justify-between items-center">
            <div class="mb-4 sm:mb-0">
                <p>&copy; 2025 Your Company. All rights reserved.</p>
            </div>
            <div class="flex space-x-4">
                <a href="#" class="text-gray-400 hover:text-white">Privacy Policy</a>
                <a href="#" class="text-gray-400 hover:text-white">Terms of Service</a>
                <a href="#" class="text-gray-400 hover:text-white">Contact Us</a>
            </div>
        </div>
    </div>
</footer>

{% endblock %}

</html>
