
{% extends 'base.html' %}

{% block title %}Update Role{% endblock %}

{% block content %}
<body class="bg-gray-100">
  <div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Update Role</h1>

    <!-- Display Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4">
          {% for category, message in messages %}
            <div class="bg-green-200 text-green-800 p-4 rounded-lg">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('update_role', role_id=role['ID']) }}" method="POST" class="space-y-6">
      <!-- User ID Selection -->
      <div>
        <label for="user_id" class="block text-gray-700 font-medium">Select User ID:</label>
        <select name="user_id" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="" disabled selected hidden>Select User</option>
          {% for user in users %}
            <option value="{{ user.id }}" {% if user.id == role.UserID %} selected {% endif %}>
              {{ user.id }} - {{ user.UserName }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Status Input -->
      <div>
        <label for="status" class="block text-gray-700 font-medium">Status:</label>
        <select name="status" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="Active" {% if role.Status == 'Active' %} selected {% endif %}>Active</option>
          <option value="Inactive" {% if role.Status == 'Inactive' %} selected {% endif %}>Inactive</option>
        </select>
      </div>

      <!-- Role Description Input -->
      <div>
        <label for="description" class="block text-gray-700 font-medium">Select Role:</label>
        <select name="description" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="" disabled selected hidden>Select Role</option>
          <option value="GUEST" {% if role.Description == 'GUEST' %} selected {% endif %}>GUEST</option>
          <option value="ADMIN" {% if role.Description == 'ADMIN' %} selected {% endif %}>ADMIN</option>
          <option value="OWNER" {% if role.Description == 'OWNER' %} selected {% endif %}>OWNER</option>
          <option value="MANAGER" {% if role.Description == 'MANAGER' %} selected {% endif %}>MANAGER</option>
          <option value="SHAREHOLDER" {% if role.Description == 'SHAREHOLDER' %} selected {% endif %}>SHAREHOLDER</option>
          <option value="PROJECT" {% if role.Description == 'PROJECT' %} selected {% endif %}>PROJECT</option>
          <option value="SPM" {% if role.Description == 'SPM' %} selected {% endif %}>SPM</option>
          <option value="BM" {% if role.Description == 'BM' %} selected {% endif %}>BM</option>
          <option value="CCC" {% if role.Description == 'CCC' %} selected {% endif %}>CCC</option>
          <option value="CC" {% if role.Description == 'CC' %} selected {% endif %}>CC</option>
          <option value="TELLER" {% if role.Description == 'TELLER' %} selected {% endif %}>TELLER</option>
          <option value="STAFF" {% if role.Description == 'STAFF' %} selected {% endif %}>STAFF</option>
          <option value="NONE" {% if role.Description == 'NONE' %} selected {% endif %}>NONE</option>
          <option value="CUSTOMER" {% if role.Description == 'CUSTOMER' %} selected {% endif %}>CUSTOMER</option>
          <option value="SUPPER" {% if role.Description == 'SUPPER' %} selected {% endif %}>SUPPER</option>
          <option value="SUPPLIER" {% if role.Description == 'SUPPLIER' %} selected {% endif %}>SUPPLIER</option>
          <option value="ACCOUNTING" {% if role.Description == 'ACCOUNTING' %} selected {% endif %}>ACCOUNTING</option>
          <option value="FINANCE" {% if role.Description == 'FINANCE' %} selected {% endif %}>FINANCE</option>
          <option value="HR" {% if role.Description == 'HR' %} selected {% endif %}>HR</option>
          <option value="IT" {% if role.Description == 'IT' %} selected {% endif %}>IT</option>
          <option value="SUPERVISOR" {% if role.Description == 'SUPERVISOR' %} selected {% endif %}>SUPERVISOR</option>
          <option value="SALE" {% if role.Description == 'SALE' %} selected {% endif %}>SALE</option>
          <option value="PURCHASE" {% if role.Description == 'PURCHASE' %} selected {% endif %}>PURCHASE</option>
          <option value="ACCOUNT" {% if role.Description == 'ACCOUNT' %} selected {% endif %}>ACCOUNT</option>
          <option value="STOCK" {% if role.Description == 'STOCK' %} selected {% endif %}>STOCK</option>
          <option value="INVENTORY" {% if role.Description == 'INVENTORY' %} selected {% endif %}>INVENTORY</option>
          <option value="PURCHASING" {% if role.Description == 'PURCHASING' %} selected {% endif %}>PURCHASING</option>
        </select>
      </div>

      <!-- Submit Button -->
      <div class="flex justify-end">
        <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition duration-200 ease-in-out">
          Update Role
        </button>
      </div>
    </form>
  </div>
</body>
{% endblock %}
