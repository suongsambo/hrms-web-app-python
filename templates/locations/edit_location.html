{% extends 'base.html' %} {% block title %}Edit Location{% endblock %} {% block
content %}
<div class="container mx-auto px-4 py-6">
  <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">
    Edit Location
  </h1>

  <form
    method="POST"
    action="{{ url_for('edit_location', id=location.id) }}"
    class="max-w-lg mx-auto bg-white p-6 rounded-md shadow-md space-y-4"
  >
    <div>
      <label for="street" class="block text-sm font-medium text-gray-700"
        >Street</label
      >
      <input
        type="text"
        name="street"
        value="{{ location.street }}"
        required
        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div>
      <label for="city" class="block text-sm font-medium text-gray-700"
        >City</label
      >
      <input
        type="text"
        name="city"
        value="{{ location.city }}"
        required
        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div>
      <label for="province" class="block text-sm font-medium text-gray-700"
        >Province</label
      >
      <input
        type="text"
        name="province"
        value="{{ location.province }}"
        required
        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div>
      <label for="country" class="block text-sm font-medium text-gray-700"
        >Country</label
      >
      <input
        type="text"
        name="country"
        value="{{ location.country }}"
        required
        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div>
      <label for="postal_code" class="block text-sm font-medium text-gray-700"
        >Postal Code</label
      >
      <input
        type="text"
        name="postal_code"
        value="{{ location.postal_code }}"
        required
        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <button
        type="submit"
        class="w-full px-4 py-2 bg-blue-500 text-white font-semibold rounded-lg hover:bg-blue-600 transition duration-300 flex items-center space-x-2"
      >
        <i class="fas fa-save"></i>
        <span>Update Location</span>
      </button>
      <a
        href="{{ url_for('list_locations') }}"
        class="w-full px-4 py-3 bg-gray-500 text-white font-semibold rounded-lg hover:bg-gray-600 transition duration-300 flex items-center space-x-2 text-center"
      >
        <i class="fas fa-arrow-left"></i>
        <span>Back to Locations</span>
      </a>
    </div>
  </form>
</div>
{% endblock %}
