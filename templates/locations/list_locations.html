{% extends 'base.html' %} {% block title %} Location List {% endblock %} {%
block content %}
<div class="container mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">Location List</h1>
  <div class="flex justify-end items-center mb-4">
    <a
      href="{{ url_for('add_location') }}"
      class="bg-blue-500 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg flex items-center"
    >
      <span class="material-symbols-outlined mr-2 text-lg">add</span>
      <span class="text-sm">Add Location</span>
    </a>
  </div>
  <!-- Table for displaying locations with DataTable functionality -->
  <table
    id="locationsTable"
    class="min-w-full table-auto bg-white shadow-md rounded-lg overflow-hidden"
  >
    <thead class="bg-gray-200 text-gray-600">
      <tr>
        <th class="py-3 px-6 text-left">City</th>
        <th class="py-3 px-6 text-left">Country</th>
        <th class="py-3 px-6 text-left">Actions</th>
      </tr>
    </thead>
    <tbody class="text-gray-700">
      {% for location in locations %}
      <tr class="border-b hover:bg-gray-50">
        <td class="py-3 px-6">{{ location.city }}</td>
        <td class="py-3 px-6">{{ location.country }}</td>
        <td class="py-3 px-6 flex items-center space-x-2">
          <a
            href="{{ url_for('view_location', id=location.id) }}"
            class="text-green-500 hover:text-green-700"
            ><i class="fas fa-eye mr-1"></i> View</a
          >
          <a
            href="{{ url_for('edit_location', id=location.id) }}"
            class="text-blue-500 hover:text-blue-700"
            ><i class="fas fa-edit mr-1"></i> Edit</a
          >
          <form
            method="POST"
            action="{{ url_for('delete_location', id=location.id) }}"
            style="display: inline"
          >
            <button
              type="submit"
              class="text-red-500 hover:text-red-700"
              onclick="return confirm('Are you sure you want to delete this location?');"
            >
              <i class="fas fa-trash-alt mr-1"></i> Delete
            </button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
  $(document).ready(function () {
    $("#locationsTable").DataTable(); // Initialize DataTable plugin
  });
</script>

{% endblock %}
