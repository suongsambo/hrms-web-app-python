{% extends 'base.html' %} {% block title %}Add Department{% endblock %} {% block
content %}

<div
  class="flex items-center justify-center min-w-[400px] max-w-5xl mx-auto overflow-x-auto overflow-y-scroll rounded-lg mt-32"
>
  <div
    class="max-w-5xl mx-auto p-10 bg-white rounded-xl shadow-2xl border border-blue-100"
  >
    <h1
      class="text-2xl font-bold text-center text-blue-600 mb-8 tracking-tight"
    >
      Add a New Department
    </h1>

    <form
      action="{{ url_for('departments.create_department') }}"
      method="POST"
      class="w-[400px] space-y-6"
    >
      <!-- Department Name -->
      <div>
        <label for="name" class="block text-sm font-semibold text-gray-700 mb-1"
          >Department Name</label
        >
        <input
          type="text"
          id="name"
          name="name"
          required
          placeholder="e.g., Accounting"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm shadow-sm"
        />
      </div>

      <!-- Description -->
      <div>
        <label
          for="description"
          class="block text-sm font-semibold text-gray-700 mb-1"
          >Description</label
        >
        <textarea
          id="description"
          name="description"
          rows="4"
          placeholder="Brief overview of the department..."
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm shadow-sm"
        ></textarea>
      </div>

      <!-- Buttons -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 pt-2">
        <button
          type="submit"
          class="w-full py-3 bg-gradient-to-r from-blue-500 to-purple-500 text-white font-bold rounded-lg hover:from-blue-600 hover:to-purple-600 transition duration-300 flex items-center justify-center gap-2 shadow-md"
        >
          <i class="fas fa-plus"></i>
          Create
        </button>

        <a
          href="{{ url_for('departments.get_all_departments') }}"
          class="w-full py-3 text-center bg-white border border-blue-300 text-blue-600 font-semibold rounded-lg hover:bg-blue-50 transition duration-300 flex items-center justify-center gap-2 shadow-sm"
        >
          <i class="fas fa-arrow-left"></i>
          Back
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
