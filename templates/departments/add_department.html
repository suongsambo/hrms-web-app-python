{% extends 'base.html' %} {% block title %}Add Department{% endblock %} {% block
content %}

<body class="bg-gray-100 font-sans">
  <div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-lg mt-12">
    <h1 class="text-3xl font-semibold text-center text-gray-800 mb-6">
      Add a New Department
    </h1>
    <form action="{{ url_for('departments.create_department') }}" method="POST">

      <div class="mb-4">
        <label for="name" class="block text-lg text-gray-700 mb-2">Department Name:</label>
        <input type="text" id="name" name="name" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>

      <div class="mb-4">
        <label for="description" class="block text-lg text-gray-700 mb-2">Description:</label>
        <textarea id="description" name="description"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
      </div>

      <button type="submit"
        class="w-full py-3 bg-blue-500 text-white font-semibold rounded-lg hover:bg-blue-600 transition duration-300 flex items-center justify-center">
        <i class="fas fa-plus mr-2"></i> Create Department
      </button>

      <div class="mt-6 text-center">
        <a href="{{ url_for('departments.get_all_departments') }}" class="text-blue-500 hover:underline">Back to
          Departments</a>
      </div>
    </form>
  </div>
</body>

</html>
{% endblock %}
