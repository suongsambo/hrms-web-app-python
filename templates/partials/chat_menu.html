<div class="relative z-10">
    <button @click="activeMenu = activeMenu === 'chat_room' ? '' : 'chat_room'"
        class="flex items-center hover:bg-gradient-to-r hover:from-indigo-600 hover:to-purple-600 p-2 rounded-lg transition-all duration-300 ease-in-out transform hover:scale-105">
        <span class="material-symbols-outlined">chat</span>
        <span class="ml-2">Chat Room</span>
        <span class="ml-2">&#9662;</span>
    </button>
    <div x-show="activeMenu === 'chat_room'" @click.away="activeMenu = ''"
        class="absolute top-full left-1/2 transform -translate-x-1/2 min-w-[200px] bg-gray-800 p-4 rounded-lg shadow-lg transition-all duration-300">
        <a href="/chat"
            class="block p-2 hover:bg-gradient-to-r hover:from-indigo-600 hover:to-purple-600 rounded-lg transition-all duration-300 ease-in-out transform hover:scale-105">
            <span class="material-symbols-outlined">chat</span>
            <span>Chat Room</span>
        </a>
    </div>
</div>
