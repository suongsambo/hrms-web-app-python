<!-- templates/contact.html -->
{% extends 'base.html' %} {% block title %}Contact Us{% endblock %} {% block
content %}
<div class="bg-gray-100 flex items-center justify-center py-8">
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
    <h1 class="text-3xl font-semibold text-center text-blue-600 mb-6">
      Contact Us
    </h1>

    <form
      action="{{ url_for('send_message') }}"
      method="POST"
      class="space-y-4"
    >
      <div class="flex flex-col">
        <label for="name" class="font-medium text-gray-700">Your Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          required
          class="border border-gray-300 p-3 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="flex flex-col">
        <label for="email" class="font-medium text-gray-700">Your Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          class="border border-gray-300 p-3 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="flex flex-col">
        <label for="message" class="font-medium text-gray-700">Message:</label>
        <textarea
          id="message"
          name="message"
          rows="4"
          required
          class="border border-gray-300 p-3 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        ></textarea>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-500 text-white p-3 rounded-md hover:bg-blue-600 transition duration-300"
      >
        Send Message
      </button>
    </form>
  </div>
</div>
{% endblock %}
