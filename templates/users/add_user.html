{% extends 'base.html' %}

{% block title %}Add User{% endblock %}

{% block content %}
<body class="container mx-auto bg-white py-8 px-3">
    <div class="max-w-4xl mx-auto mt-10 p-8 bg-white rounded-lg shadow-xl">
        <h2 class="text-3xl font-bold text-gray-800 mb-6">Add User</h2>
        <form action="{{ url_for('add_user') }}" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6" enctype="multipart/form-data">
            

            <div>
                <label for="image_data" class="block text-gray-700 font-semibold mb-2">Profile Image</label>
                <input type="file" name="image">
            </div>
            <!-- Username -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Username</label>
                <input type="text" name="username" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Branch -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Branch</label>
                <select name="branch" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Select a Branch</option>
                    {% for branch in branches %}
                    <option value="{{ branch['Branch'] }}" {% if selected_branch == branch['ID'] %}selected{% endif %}>{{ branch['Branch'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Role -->
            <div>
                <label for="role_default" class="block text-gray-700 font-semibold mb-2">Select Role</label>
                <select
                    id="role_default"
                    name="role_default"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                    <option value="" disabled selected hidden>Select Role</option>
                    <option value="1">GUEST</option>
                    <option value="10">CUSTOMER</option>
                    <option value="15">NONE</option>
                    <option value="20">Employee</option>
                    <option value="25">TELLER</option>
                    <option value="30">CC</option>
                    <option value="35">CCC</option>
                    <option value="40">BM</option>
                    <option value="45">SPM</option>
                    <option value="50">PROJECT</option>
                    <option value="55">SHAREHOLDER</option>
                    <option value="60">MANAGER</option>
                    <option value="65">SUPERVISOR</option>
                    <option value="70">SALE</option>
                    <option value="75">PURCHASE</option>
                    <option value="80">STOCK</option>
                    <option value="85">INVENTORY</option>
                    <option value="87">PURCHASING</option>
                    <option value="90">ACCOUNT</option>
                    <option value="92">ACCOUNTING</option>
                    <option value="94">FINANCE</option>
                    <option value="96">HR</option>
                    <option value="98">IT</option>
                    <option value="99">SUPPLIER</option>
                    <option value="100">ADMIN</option>
                    <option value="100">OWNER</option>
                </select>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Mobile Number -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Mobile Number</label>
                <input type="text" name="mobile1" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Khmer First Name -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">First Name (Khmer)</label>
                <input type="text" name="first_name_kh" class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Khmer Last Name -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Last Name (Khmer)</label>
                <input type="text" name="last_name_kh" class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- English First Name -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">First Name (English)</label>
                <input type="text" name="first_name_en" class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- English Last Name -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Last Name (English)</label>
                <input type="text" name="last_name_en" class="w-full px-4 py-3 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Admin Checkbox -->
            <div class="flex items-center space-x-3 mt-4">
                <input type="checkbox" name="is_admin" value="1" class="h-5 w-5 border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                <label class="text-gray-700">Is Admin</label>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center justify-start mt-6 space-x-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-md w-full md:w-auto flex items-center justify-center space-x-2">
                    <span class="material-symbols-outlined">send</span>
                    <span>Submit</span>
                </button>
                <a href="{{ url_for('list_users') }}" class="text-gray-500">
                    <button type="button" class="bg-gray-400 hover:bg-gray-500 text-white font-semibold py-3 px-6 rounded-md w-full md:w-auto flex items-center justify-center space-x-2">
                        <span class="material-symbols-outlined">cancel</span>
                        <span>Cancel</span>
                    </button>
                </a>
            </div>
        </form>
    </div>
</body>
{% endblock %}
