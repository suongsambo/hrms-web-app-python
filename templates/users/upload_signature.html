{% extends 'base.html' %} {% block title %}Upload Signature{% endblock %} {%
block content %}
<body class="bg-gray-100">
  <!-- Container for centering -->
  <div class="min-h-screen flex justify-center items-center">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-lg">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">
        Upload Your Signature
      </h2>

      <!-- Response Message Section -->
      <div id="responseMessage" class="mt-4 text-center text-gray-700"></div>

      <!-- Upload Form -->
      <form
        id="imageUploadForm"
        method="POST"
        action="/users/{{ user_id }}/signature/upload"
        enctype="multipart/form-data"
        class="space-y-6 w-full"
      >
        <!-- Signature Upload Section -->
        <div class="col-span-full">
          <label
            for="signature"
            class="block text-lg font-medium text-gray-900 mb-4"
          >
            Signature Image
          </label>

          <!-- Dropzone for file upload -->
          <div
            id="dropzone"
            class="mt-2 flex justify-center rounded-xl border-4 border-dashed border-gray-300 p-8 transition-all hover:border-indigo-600 focus:ring-2 focus:ring-indigo-500 w-full"
            ondrop="handleDrop(event)"
            ondragover="handleDragOver(event)"
            ondragenter="handleDragEnter(event)"
            ondragleave="handleDragLeave(event)"
          >
            <div class="text-center flex flex-col items-center">
              <svg
                class="w-16 h-16 text-gray-400 mb-4"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  fill-rule="evenodd"
                  d="M1.5 6a2.25 2.25 0 0 1 2.25-2.25h16.5A2.25 2.25 0 0 1 22.5 6v12a2.25 2.25 0 0 1-2.25 2.25H3.75A2.25 2.25 0 0 1 1.5 18V6ZM3 16.06V18c0 .414.336.75.75.75h16.5A.75.75 0 0 0 21 18v-1.94l-2.69-2.689a1.5 1.5 0 0 0-2.12 0l-.88.879.97.97a.75.75 0 1 1-1.06 1.06l-5.16-5.159a1.5 1.5 0 0 0-2.12 0L3 16.061Zm10.125-7.81a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Z"
                  clip-rule="evenodd"
                />
              </svg>

              <div class="mt-4 text-sm text-gray-600">
                <label
                  for="signature_file"
                  class="relative cursor-pointer rounded-md bg-indigo-100 text-indigo-600 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 py-2 px-4 font-semibold"
                >
                  <span>Upload</span>
                  <input
                    type="file"
                    name="signature"
                    id="signature_file"
                    class="sr-only"
                    onchange="handleFileSelect(event)"
                  />
                </label>
                <p class="mt-2">or drag and drop</p>
              </div>
              <p class="text-xs text-gray-500 mt-1">PNG, JPG, GIF up to 10MB</p>
            </div>
          </div>
        </div>

        <!-- Image Preview Section -->
        <div id="imagePreview" class="flex justify-center items-center mt-6">
          <img
            id="signatureImage"
            src=""
            alt="Signature Image Preview"
            class="hidden w-32 h-32 rounded-lg object-cover border-2 border-gray-300 shadow-lg"
          />
        </div>

        <!-- Upload Button -->
        <div class="flex justify-between items-center">
          <div class="flex items-center w-full">
            <button
              type="submit"
              class="py-2 px-6 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-200"
            >
              Upload Signature
            </button>
          </div>
          <div class="flex items-center w-full justify-end">
            <a
              href="{{ url_for('profile', user_id=user_id) }}"
              class="text-indigo-600 hover:underline"
            >
              <i class="fas fa-arrow-left mr-2"></i> Back to Profile
            </a>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Handle file selection via input
    function handleFileSelect(event) {
      const fileInput = event.target;
      const file = fileInput.files[0];
      handleFileUpload(file);
      previewImage(file); // Preview the selected image
    }

    // Handle drag-over event
    function handleDragOver(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    // Handle drag-enter event
    function handleDragEnter(event) {
      event.preventDefault();
      event.stopPropagation();
      const dropzone = document.getElementById("dropzone");
      dropzone.classList.add("border-indigo-500", "bg-indigo-50");
    }

    // Handle drag-leave event
    function handleDragLeave(event) {
      event.preventDefault();
      event.stopPropagation();
      const dropzone = document.getElementById("dropzone");
      dropzone.classList.remove("border-indigo-500", "bg-indigo-50");
    }

    // Handle drop event
    function handleDrop(event) {
      event.preventDefault();
      event.stopPropagation();
      const file = event.dataTransfer.files[0];
      const dropzone = document.getElementById("dropzone");
      dropzone.classList.remove("border-indigo-500", "bg-indigo-50");
      handleFileUpload(file);
      previewImage(file); // Preview the dropped image
    }

    // Handle the file upload
    function handleFileUpload(file) {
      const form = document.getElementById("imageUploadForm");
      const formData = new FormData(form);
      formData.set("signature", file);

      // Trigger the file upload
      const responseMessage = document.getElementById("responseMessage");

      fetch(form.action, {
        method: "POST",
        body: formData,
      })
        .then((response) => {
          if (response.ok) {
            responseMessage.textContent = "Signature uploaded successfully!";
            responseMessage.classList.add("text-green-500");
          } else {
            responseMessage.textContent = "Error uploading signature!";
            responseMessage.classList.add("text-red-500");
          }
        })
        .catch((error) => {
          responseMessage.textContent = "Error uploading signature!";
          responseMessage.classList.add("text-red-500");
        });
    }

    // Preview image after selection or drop
    function previewImage(file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        const signatureImage = document.getElementById("signatureImage");
        signatureImage.src = e.target.result;
        signatureImage.classList.remove("hidden"); // Show the image preview
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
{% endblock %}
