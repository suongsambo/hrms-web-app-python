{% extends 'base.html' %} {% block title %}Edit User{% endblock %} {% block
content %}

<div class="container mx-auto py-8">
  <h2 class="text-2xl font-bold mb-6">Edit User</h2>
  <form
    method="POST"
    action="{{ url_for('edit_user', id=user['ID']) }}"
    class="space-y-4"
  >
    <div class="flex flex-col">
      <label for="username" class="block text-sm font-medium text-gray-700"
        >Username:</label
      >
      <input
        type="text"
        id="username"
        name="username"
        value="{{ user['UserName'] }}"
        required
        class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
      />
    </div>

    <div class="flex flex-col">
      <label for="email" class="block text-sm font-medium text-gray-700"
        >Email:</label
      >
      <input
        type="email"
        id="email"
        name="email"
        value="{{ user['Email'] }}"
        required
        class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
      />
    </div>

    <div class="flex flex-col">
      <label for="first_name_kh" class="block text-sm font-medium text-gray-700"
        >First Name (Khmer):</label
      >
      <input
        type="text"
        id="first_name_kh"
        name="first_name_kh"
        value="{{ user['FirstNameKh'] }}"
        required
        class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
      />
    </div>

    <div class="flex flex-col">
      <label for="last_name_kh" class="block text-sm font-medium text-gray-700"
        >Last Name (Khmer):</label
      >
      <input
        type="text"
        id="last_name_kh"
        name="last_name_kh"
        value="{{ user['LastNameKh'] }}"
        required
        class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
      />
    </div>

    <div class="flex flex-col">
      <label for="first_name_en" class="block text-sm font-medium text-gray-700"
        >First Name (English):</label
      >
      <input
        type="text"
        id="first_name_en"
        name="first_name_en"
        value="{{ user['FirstNameEn'] }}"
        required
        class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
      />
    </div>

    <div class="flex flex-col">
      <label for="last_name_en" class="block text-sm font-medium text-gray-700"
        >Last Name (English):</label
      >
      <input
        type="text"
        id="last_name_en"
        name="last_name_en"
        value="{{ user['LastNameEn'] }}"
        required
        class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
      />
    </div>

    <div class="flex flex-col">
      <label for="branch" class="block text-sm font-medium text-gray-700"
        >Branch:</label
      >
      <input
        type="text"
        id="branch"
        name="branch"
        value="{{ user['Branch'] }}"
        required
        class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
      />
    </div>

    <div class="flex flex-col">
      <label for="is_admin" class="block text-sm font-medium text-gray-700"
        >Is Admin:</label
      >
      <input type="checkbox" id="is_admin" name="is_admin" value="1" {% if
      user['IsAdmin']==1 %}checked{% endif %} class="mt-1 rounded-md border
      border-gray-300 shadow-sm focus:border-indigo-300 focus:ring
      focus:ring-indigo-200 focus:ring-opacity-50">
    </div>

    <div class="flex flex-col">
      <label for="mobile1" class="block text-sm font-medium text-gray-700"
        >Mobile Number:</label
      >
      <input
        type="text"
        id="mobile1"
        name="mobile1"
        value="{{ user['Mobile1'] }}"
        required
        class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 px-3 py-2 placeholder-gray-400"
      />
    </div>

    <button
      type="submit"
      class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
    >
      Update
    </button>

    <a
      href="{{ url_for('list_users') }}"
      class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded"
      >Cancel</a
    >
  </form>
</div>

{% endblock %}
