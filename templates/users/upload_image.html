<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Profile Image</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <!-- Container -->
    <div class="min-h-screen flex justify-center items-center">
      <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">
          Upload Your Profile Image
        </h2>

        <!-- Upload Form -->
        <form
          id="imageUploadForm"
          method="POST"
          action="/users/{{ current_user.id }}/image/upload"
          enctype="multipart/form-data"
          class="space-y-4"
        >
          <div class="col-span-full">
            <label
              for="cover-photo"
              class="block text-sm/6 font-medium text-gray-900"
              >Cover photo</label
            >
            <div
              class="mt-2 flex justify-center rounded-lg border border-dashed border-gray-900/25 px-6 py-10"
            >
              <div class="text-center">
                <svg
                  class="mx-auto size-12 text-gray-300"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  aria-hidden="true"
                  data-slot="icon"
                >
                  <path
                    fill-rule="evenodd"
                    d="M1.5 6a2.25 2.25 0 0 1 2.25-2.25h16.5A2.25 2.25 0 0 1 22.5 6v12a2.25 2.25 0 0 1-2.25 2.25H3.75A2.25 2.25 0 0 1 1.5 18V6ZM3 16.06V18c0 .414.336.75.75.75h16.5A.75.75 0 0 0 21 18v-1.94l-2.69-2.689a1.5 1.5 0 0 0-2.12 0l-.88.879.97.97a.75.75 0 1 1-1.06 1.06l-5.16-5.159a1.5 1.5 0 0 0-2.12 0L3 16.061Zm10.125-7.81a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Z"
                    clip-rule="evenodd"
                  />
                </svg>
                <div class="mt-4 flex text-sm/6 text-gray-600">
                  <label
                    for="image_data"
                    class="relative cursor-pointer rounded-md bg-white font-semibold text-indigo-600 focus-within:ring-2 focus-within:ring-indigo-600 focus-within:ring-offset-2 focus-within:outline-hidden hover:text-indigo-500"
                  >
                    <span>Upload a file</span>
                    <input
                      type="file"
                      name="image"
                      id="image_data"
                      class="sr-only"
                    />
                  </label>
                  <p class="pl-1">or drag and drop</p>
                </div>
                <p class="text-xs/5 text-gray-600">PNG, JPG, GIF up to 10MB</p>
              </div>
            </div>
          </div>

          <!-- Upload Button -->
          <div>
            <button
              type="submit"
              class="w-full py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              Upload Image
            </button>
          </div>
        </form>

        <!-- Back to Profile Button -->
        <div class="mt-4 text-center">
          <a
            href="{{ url_for('profile', user_id=current_user.id) }}"
            class="text-blue-500 hover:underline"
          >
            Back to Profile
          </a>
        </div>

        <!-- Response Message Section -->
        <div id="responseMessage" class="mt-4 text-center text-gray-700"></div>
      </div>
    </div>

    <script>
      const form = document.getElementById("imageUploadForm");
      const responseMessage = document.getElementById("responseMessage");

      form.addEventListener("submit", async (e) => {
        e.preventDefault(); // Prevent default form submission

        const formData = new FormData(form); // Create FormData object to send the file

        // Show loading message
        responseMessage.textContent = "Uploading image...";
        responseMessage.classList.remove("text-red-500", "text-green-500");

        try {
          const response = await fetch(form.action, {
            method: "POST",
            body: formData,
          });

          const data = await response.json(); // Parse JSON from the server response
          console.log(data); // Debugging: Log the response to the console

          if (response.ok) {
            // If the response is successful, update the message
            responseMessage.textContent =
              data.message || "Image uploaded successfully!";
            responseMessage.classList.add("text-green-500");
            responseMessage.classList.remove("text-red-500");

            // Add success alert
            alert("Image uploaded successfully!");
          } else {
            // If there’s an error, handle the error message
            responseMessage.textContent = data.error || "An error occurred!";
            responseMessage.classList.add("text-red-500");
            responseMessage.classList.remove("text-green-500");
          }
        } catch (error) {
          // If the fetch fails (e.g., network error), show a general error message
          responseMessage.textContent =
            "Failed to upload image. Please try again.";
          responseMessage.classList.add("text-red-500");
          responseMessage.classList.remove("text-green-500");
        }
      });
    </script>
  </body>
</html>
