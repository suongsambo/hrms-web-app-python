<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Request Confirm</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      .form-container {
        max-width: 600px;
        margin: auto;
        padding: 20px;
        border: 1px solid #ccc;
      }
      label {
        display: block;
        margin-bottom: 10px;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 20px;
      }
      button {
        padding: 10px 15px;
        background-color: #4caf50;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #45a049;
      }
      .message {
        padding: 10px;
        margin-bottom: 20px;
      }
      .message.success {
        background-color: #4caf50;
        color: white;
      }
      .message.danger {
        background-color: #f44336;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h1>Add Request Confirm</h1>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div>
        {% for category, message in messages %}
        <div class="message {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <!-- Form to submit new request_confirm -->
      <form action="/request_confirm" method="POST">
        <label for="request_id">Request ID:</label>
        <input type="number" id="request_id" name="request_id" required />

        <label for="confirm_id">Confirm ID:</label>
        <input type="number" id="confirm_id" name="confirm_id" required />

        <button type="submit">Submit</button>
      </form>

      <br />
      <a href="{{ url_for('list_confirms') }}">View All Confirms</a>
    </div>
  </body>
</html>
