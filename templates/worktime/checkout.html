{% extends 'base.html' %} {% block title %}Employees{% endblock %} {% block
content %}

<div class="container mx-auto p-6 bg-white shadow-md rounded-lg mt-10">
  <div
    class="bg-white p-8 rounded-lg shadow-2xl max-w-sm w-full mx-auto"
    style="width: 100%"
  >
    <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-6">
      Checkout for {{ user['UserName'] }}
    </h1>

    <form method="POST" class="space-y-6">
      <p class="text-gray-600 text-center text-lg font-medium">
        Are you sure you want to check out?
      </p>

      <div class="flex items-center justify-center space-x-4">
        <button
          type="submit"
          class="w-full py-3 bg-red-500 hover:bg-red-700 text-white text-lg font-bold rounded-lg transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500 shadow-lg"
        >
          Checkout
        </button>
      </div>
    </form>

    <div class="mt-6 text-center">
      <a
        href="{{ url_for('list_checkin') }}"
        class="text-blue-500 hover:text-blue-700 text-sm font-semibold underline"
      >
        Back to Check-in List
      </a>
    </div>
  </div>
</div>

{% endblock %}
