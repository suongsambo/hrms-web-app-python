{% extends 'base.html' %} {% block title %}Users{% endblock %} {% block content
%}

<body>

    <div class="container mx-auto py-1 bg-white p-6 rounded-lg shadow-md">


        <h1 class="text-2xl font-bold mb-4">Upload Your Image</h1>
        <form action="{{ url_for('upload_image') }}" method="POST" enctype="multipart/form-data" class="space-y-4">
            <label for="file" class="block text-gray-700">Choose an image to upload:</label>
            <input type="file" id="file" name="file" accept="image/*" required
                class="w-full px-3 py-2 border rounded file:bg-blue-500 file:text-white file:font-semibold file:py-2 file:px-4 file:rounded-md hover:file:bg-blue-700 focus:file:outline-none focus:file:ring-2 focus:file:ring-blue-500" />

            <div class="flex justify-start items-center mr-4 mb-2 gap-x-2">
                <button type="submit"
                    class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded flex items-center space-x-1">
                    <span class="material-symbols-outlined">upload</span>
                    <span>Upload</span>
                </button>
                <button type="button" onclick="window.location.href='{{ url_for('list_user_files') }}'"
                    class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded flex items-center space-x-1">
                    <span class="material-symbols-outlined">close</span>
                    <span>Cancel</span>
                </button>
            </div>
        </form>
    </div>
</body>

{% endblock %}
