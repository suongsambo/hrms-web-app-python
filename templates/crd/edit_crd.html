{% extends 'base.html' %} {% block title %}Edit CRD{% endblock %} {% block
content %}
<div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-md">
  <h2 class="text-2xl font-semibold mb-6">Edit CRD</h2>

  <form
    method="POST"
    action="{{ url_for('edit_crd', id=crd.id) }}"
    class="space-y-4"
  >
    <div>
      <label
        for="personal_info_id"
        class="block text-sm font-medium text-gray-700"
        >Personal Info ID</label
      >
      <input
        type="text"
        name="personal_info_id"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        value="{{ crd.personal_info_id }}"
        required
      />
    </div>
    <div>
      <label for="location_id" class="block text-sm font-medium text-gray-700"
        >Location ID</label
      >
      <input
        type="text"
        name="location_id"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        value="{{ crd.location_id }}"
        required
      />
    </div>
    <div>
      <label for="credit_limit" class="block text-sm font-medium text-gray-700"
        >Credit Limit</label
      >
      <input
        type="number"
        step="0.01"
        name="credit_limit"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        value="{{ crd.credit_limit }}"
        required
      />
    </div>
    <div>
      <label
        for="credit_risk_rating"
        class="block text-sm font-medium text-gray-700"
        >Credit Risk Rating</label
      >
      <input
        type="number"
        step="0.01"
        name="credit_risk_rating"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        value="{{ crd.credit_risk_rating }}"
        required
      />
    </div>
    <div>
      <label for="status" class="block text-sm font-medium text-gray-700"
        >Status</label
      >
      <input
        type="text"
        name="status"
        class="mt-1 block w-full px-4 py-2 border rounded-md"
        value="{{ crd.status }}"
        required
      />
    </div>

    <button
      type="submit"
      class="mt-6 w-full bg-blue-500 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-600"
    >
      Update CRD
    </button>
  </form>
</div>
{% endblock %}
