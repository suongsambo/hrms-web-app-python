{% extends 'base.html' %} {% block title %} Add Employee {% endblock %} {% block
content %}
<div class="max-w-7xl mx-auto bg-white p-4 rounded-lg shadow-lg">

  <form action="{{ url_for('add_employee') }}" method="POST" enctype="multipart/form-data" class="space-y-6">

    <h3 class="text-xl font-semibold text-gray-800 mb-4">
      Employee Information
    </h3>


    <h2 class="text-lg sm:text-xl font-semibold text-blue-600 mb-4 border-b border-blue-300 pb-2">
      🧑‍💼 Employment Information
    </h2>
    <!-- TODO: one -->

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2">
      <!-- Name Field -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Name:</label>
        <div class="mt-2 relative">
          <input type="text" id="name" name="name" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
      </div>

      <!-- Age Field -->
      <div>
        <label for="age" class="block text-sm font-medium text-gray-700">Age:</label>
        <div class="mt-2 relative">
          <input type="number" id="age" name="age" required min="18" max="99"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
      </div>

      <div>
        <label for="department" class="block text-sm font-medium text-gray-700">Department:</label>
        <div class="mt-2 relative">
          <select id="department" name="department" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            <option value="" disabled selected>Select a Department</option>
            {% for department in departments %}
            <option value="{{ department.id}}">{{ department.Name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>


      <!-- Position Field -->
      <div>
        <label for="position" class="block text-sm font-medium text-gray-700">Position:</label>
        <div class="mt-2 relative">
          <select id="position" name="position_id" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            <option value="" disabled selected>Select a Position</option>
            {% for position in positions %}
            <option value="{{ position.id }}">
              {{ position.PositionName }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Joining Date Field -->
      <div>
        <label for="joining_date" class="block text-sm font-medium text-gray-700">Joining Date:</label>
        <div class="mt-2 relative">
          <input type="date" id="joining_date" name="joining_date" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
      </div>

      <!-- Status Field -->
      <div>
        <label for="status" class="block text-sm font-medium text-gray-700">Status:</label>
        <div class="mt-2 relative">
          <select id="status" name="status" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            <option value="" disabled selected>Select a Status</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="On Leave">On Leave</option>
          </select>
        </div>
      </div>

      <!-- Branch Field -->
      <div>
        <label for="branch" class="block text-sm font-medium text-gray-700">Branch:</label>
        <div class="mt-2 relative">
          <select id="branch" name="branch" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            <option value="" disabled selected>Select a Branch</option>
            {% for branch in branches %}
            <option value="{{ branch['Branch'] }}">
              {{ branch['Branch'] }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- User ID Field -->
      <div>
        <label for="user_id" class="block text-sm font-medium text-gray-700">User ID:</label>
        <div class="mt-2 relative">
          <select id="user_id" name="user_id" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            <option value="" disabled selected>Select a User</option>
            {% for user in users %}
            <option value="{{ user.id }}">
              {{ user.id }} - {{ user.UserName }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Phone Number Field -->
      <div class="lg:col-span-2">
        <label for="phone_number" class="block text-sm font-medium text-gray-700">Phone Number:</label>
        <div class="mt-2 relative">
          <input type="text" id="phone_number" name="phone_number" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
      </div>

      <!-- Email Field -->
      <div class="lg:col-span-2">
        <label for="email" class="block text-sm font-medium text-gray-700">Email:</label>
        <div class="mt-2 relative">
          <input type="email" id="email" name="email" required
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
      </div>

      <!-- Address Field -->
      <div class="lg:col-span-4">
        <label for="address" class="block text-sm font-medium text-gray-700">Address:</label>
        <div class="mt-2 relative">
          <textarea id="address" name="address"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
            rows="3"></textarea>
        </div>
      </div>
    </div>

      <!-- Family Status Field -->

            <option value="other">Other</option>

        </div>

      <!-- Place of Birth Field -->
      <div>
        <label for="place_of_birth" class="block text-sm font-medium text-gray-700">Place of Birth:</label>
        <div class="mt-2 relative">
          <input type="text" id="place_of_birth" name="place_of_birth"

      <!-- Permanent Address Field -->
      <div>
        <label for="permanent_address" class="block text-sm font-medium text-gray-700">Permanent Address:</label>
        <div class="mt-2 relative">
          <input type="text" id="permanent_address" name="permanent_address"

      <!-- Village Field -->
      <div>
        <label for="village" class="block text-sm font-medium text-gray-700">Village:</label>
        <div class="mt-2 relative">
          <input type="text" id="village" name="village"

        <div class="mt-2 relative">

      <!-- District Field -->
      <div>
        <label for="district" class="block text-sm font-medium text-gray-700">District:</label>
        <div class="mt-2 relative">

      <!-- Province Field -->
      <div>
        <label for="province" class="block text-sm font-medium text-gray-700">Province:</label>
        <div class="mt-2 relative">
          <input type="text" id="province" name="province"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
      </div>

      <!-- Home Number Field -->
      <div>
        <label for="home_number" class="block text-sm font-medium text-gray-700">Home Number:</label>
        <div class="mt-2 relative">
          <input type="text" id="home_number" name="home_number"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
      </div>

      <!-- Street Number Field -->
      <div>
        <label for="street_number" class="block text-sm font-medium text-gray-700">Street Number:</label>
        <div class="mt-2 relative">

      <!-- Group Name Field -->

        <div class="mt-2 relative">
          <input type="text" id="group_name" name="group_name"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />

      </div>
    </div>

    <section class="mb-6">

        🏡 Family Information
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">

        <div>
          <label class="block text-sm font-medium text-gray-700">Passing Test Date</label>

        </div>

        <!-- Residence Book or Family Book -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Residence Book / Family Book</label>
          <input type="text" name="residence_book_or_family_book" placeholder="Book number or details"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- Made On -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Made On</label>
          <input type="date" name="made_on"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- Number of Children -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Number of Children</label>
          <input type="number" name="have_a_number_of_children" min="0"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- Father Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Father's Name</label>
          <input type="text" name="father_name"
            class="block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- Mother Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Mother's Name</label>
          <input type="text" name="mother_name"
