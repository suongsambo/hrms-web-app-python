{% extends 'base.html' %} {% block title %}Add Employee{% endblock %} {% block
content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md">
  <h2 class="text-2xl font-semibold text-gray-800 mb-4">Add Employee</h2>

  <form action="{{ url_for('add_employee') }}" method="POST" class="space-y-4">
    <div>
      <label for="name" class="block text-sm font-medium text-gray-700"
        >Name:</label
      >
      <input
        type="text"
        id="name"
        name="name"
        required
        class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <div>
      <label for="age" class="block text-sm font-medium text-gray-700"
        >Age:</label
      >
      <input
        type="number"
        id="age"
        name="age"
        required
        class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <div>
      <label for="department" class="block text-sm font-medium text-gray-700"
        >Department:</label
      >
      <input
        type="text"
        id="department"
        name="department"
        required
        class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <div>
      <label for="salary" class="block text-sm font-medium text-gray-700"
        >Salary:</label
      >
      <input
        type="number"
        id="salary"
        name="salary"
        step="0.01"
        required
        class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <div>
      <label for="branch" class="block text-sm font-medium text-gray-700"
        >Branch:</label
      >
      <select
        id="branch"
        name="branch"
        required
        class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
      >
        <option value="" disabled selected>Select a Branch</option>
        {% for branch in branches %}
        <option value="{{ branch['Branch'] }}">{{ branch['Branch'] }}</option>
        {% endfor %}
      </select>
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition"
    >
      Add Employee
    </button>
  </form>

  <div class="mt-4">
    <a
      href="{{ url_for('list_employees') }}"
      class="text-blue-500 hover:text-blue-700 transition"
      >← Back to Employees List</a
    >
  </div>
</div>
{% endblock %}
