{% extends "base.html" %} {% block content %}
<div class="max-w-2xl mx-auto py-10 px-6">
    <div class="bg-white shadow-md rounded-lg p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">
            Import Employees from Excel
        </h1>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %}
        <div class="space-y-2 mb-4">
            {% for category, message in messages %}
            <div
                class="p-3 rounded text-sm {% if category == 'success' %} bg-green-100 text-green-800 border border-green-300 {% elif category == 'error' %} bg-red-100 text-red-800 border border-red-300 {% else %} bg-gray-100 text-gray-800 border border-gray-300 {% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %} {% endwith %}

        <form method="post" enctype="multipart/form-data" class="space-y-6">
            <div>
                <label for="excel_file" class="block text-sm font-medium text-gray-700 mb-1">Select Excel File</label>
                <input type="file" name="excel_file" accept=".xlsx,.xls" required
                    class="mt-2 block w-full px-3 py-2 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150" />
            </div>

            <div class="flex space-x-4">
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2 rounded-lg transition duration-200 shadow flex items-center">
                    <i class="fas fa-upload mr-2"></i>
                    Upload & Import
                </button>
                <a href="{{ url_for('download_import_template') }}"
                    class="bg-green-600 hover:bg-green-700 text-white font-medium px-5 py-2 rounded-lg transition duration-200 shadow flex items-center">
                    <i class="fas fa-download mr-2"></i>
                    Download Template
                </a>
                <a href="{{ url_for('list_employees') }}"
                    class="bg-gray-600 hover:bg-gray-700 text-white font-medium px-5 py-2 rounded-lg transition duration-200 shadow flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i>
                    Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
