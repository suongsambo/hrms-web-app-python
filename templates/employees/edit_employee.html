{% extends 'base.html' %}

{% block title %}Employees{% endblock %}

{% block content %}

<div class="container mx-auto py-8">
    <h2 class="text-2xl font-bold mb-6">Edit Employee</h2>
    <form method="POST" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
        <label for="name" class="block text-gray-700 text-sm font-bold mb-2">Name:</label>
        <input type="text" id="name" name="name" value="{{ employee['name'] }}" required
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">

        <label for="age" class="block text-gray-700 text-sm font-bold mb-2">Age:</label>
        <input type="number" id="age" name="age" value="{{ employee['age'] }}" required
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">

        <label for="department" class="block text-gray-700 text-sm font-bold mb-2">Department:</label>
        <input type="text" id="department" name="department" value="{{ employee['department'] }}" required
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">

        <label for="salary" class="block text-gray-700 text-sm font-bold mb-2">Salary:</label>
        <input type="number" id="salary" name="salary" step="0.01" value="{{ employee['salary'] }}" required
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
        <br>
        <br>
        <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Update
            Employee</button>
        <a href="{{ url_for('list_employees') }}"
            class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">Cancel</a>
    </form>
</div>

{% endblock %}
